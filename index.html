      L'outil détecte automatiquement les colonnes habituelles :<br>
      <strong>Entreprise</strong>, <strong>Contact</strong>, <strong>Fonction</strong>, <strong>Ville</strong>, <strong>Département</strong>, <strong>Téléphone</strong>, <strong>Email</strong>, <strong>Site/Insta</strong>, <strong>CNC</strong>, <strong>Spécialité</strong>, <strong>Source</strong>, <strong>Statut</strong>.<br><br>
      Les lignes de titre, tableaux de bord et légendes sont ignorés automatiquement.
    </div>
    <input type="file" id="import-file" accept=".csv,.xlsx,.xls,text/csv" onchange="handleImport(event)" style="display:none">
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:14px;">
      <input type="checkbox" id="import-replace" style="width:16px; height:16px; accent-color:var(--accent);">
      <label for="import-replace" style="font-size:13px; color:var(--ink-2); cursor:pointer;">Remplacer la liste actuelle (sinon : ajouter)</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent btn-block" onclick="document.getElementById('import-file').click()">Choisir un fichier</button>
    </div>
  `);
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  // Détection robuste du type (extension + MIME + taille)
  const name = file.name || '';
  const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
  const mime = (file.type || '').toLowerCase();
  const isXlsx = ext === 'xlsx' || ext === 'xls' ||
                 mime.includes('sheet') || mime.includes('excel') ||
                 mime === 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' ||
                 mime === 'application/vnd.ms-excel';
  const isCsv = ext === 'csv' || ext === 'tsv' || ext === 'txt' ||
                mime.includes('csv') || mime === 'text/plain';

  const replaceEl = document.getElementById('import-replace');
  const replace = replaceEl ? replaceEl.checked : false;

  // Vérifier que SheetJS est chargé si on a un XLSX
  if (isXlsx && typeof XLSX === 'undefined') {
    showError(`SheetJS n'a pas pu charger (pas de connexion ?). Essaie de :\n\n1. Vérifier ta connexion internet\n2. Recharger la page\n3. Ou convertir ton .xlsx en .csv et le réessayer`);
    return;
  }

  if (!isXlsx && !isCsv) {
    showError(`Format non reconnu : "${ext || 'sans extension'}" (${mime || 'type inconnu'}).\n\nFormats acceptés : .xlsx, .xls, .csv`);
    return;
  }

  const reader = new FileReader();

  reader.onerror = () => {
    console.error('FileReader error:', reader.error);
    showError(`Impossible de lire le fichier :\n${reader.error ? reader.error.message : 'erreur inconnue'}`);
  };

  reader.onload = (ev) => {
    let rows;
    // Stage 1: parsing
    try {
      if (isXlsx) {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) {
          throw new Error('Le classeur ne contient aucune feuille');
        }
        let sheetName = wb.SheetNames.find(n => /prospect/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
      } else {
        rows = parseCSV(ev.target.result);
      }
    } catch (err) {
      console.error('Parse error:', err);
      showError(`Erreur au parsing du fichier :\n${err.message || err}\n\nLe fichier est peut-être corrompu ou dans un format inattendu.`);
      return;
    }

    if (!rows || rows.length === 0) {
      showError('Le fichier semble vide.');
      return;
    }

    // Stage 2: extraction
    let imported;
    try {
      imported = extractProspectsFromRows(rows);
    } catch (err) {
      console.error('Extraction error:', err);
      showError(`Erreur d'extraction des prospects :\n${err.message || err}\n\nLa 1ère ligne de ton fichier : ${JSON.stringify((rows[0] || []).slice(0, 5))}`);
      return;
    }

    if (imported.length === 0) {
      showError(`Aucun prospect détecté.\n\nVérifie que ton fichier contient des colonnes comme "Entreprise", "Téléphone", "Email".\n\nEn-têtes trouvés : ${JSON.stringify((rows[0] || []).slice(0, 8))}`);
      return;
    }

    // Stage 3: apply
    if (replace) {
      state.prospects = imported;
    } else {
      const existingKeys = new Set(state.prospects.map(p => dedupKey(p)));
      imported.forEach(p => {
        if (!existingKeys.has(dedupKey(p))) {
          state.prospects.push(p);
        }
      });
    }
    save();
    closeModal();
    renderList();
    toast(`${imported.length} prospect${imported.length > 1 ? 's' : ''} ${replace ? 'importé' + (imported.length > 1 ? 's' : '') : 'ajouté' + (imported.length > 1 ? 's' : '')}`);
  };

  // Démarrage de la lecture
  try {
    if (isXlsx) {
      reader.readAsArrayBuffer(file);
    } else {
      reader.readAsText(file, 'UTF-8');
    }
  } catch (err) {
    console.error('Read trigger error:', err);
    showError(`Impossible de démarrer la lecture :\n${err.message || err}`);
  }
}

function showError(msg) {
  openModal(`
    <div class="modal-title">Oups…</div>
    <div style="font-size:14px; color:var(--ink-2); line-height:1.6; white-space:pre-wrap; padding: 4px 0 8px;">${escapeHtml(msg)}</div>
    <div class="modal-actions">
      <button class="btn btn-accent btn-block" onclick="closeModal()">OK</button>
    </div>
  `);
}

function dedupKey(p) {
  return (p.company || '').trim().toLowerCase() + '|' + (p.phone || '').replace(/\s/g, '');
}

function extractProspectsFromRows(rows) {
  if (!rows || rows.length === 0) return [];

  // Find header row: the row that contains at least 2 of the expected column names
  const columnHints = ['entreprise','contact','nom','telephone','téléphone','email','ville','cnc','statut','site','insta','specialite','spécialité','source','fonction','departement','département'];
  let headerRowIdx = -1;
  let bestScore = 0;
  for (let i = 0; i < Math.min(rows.length, 20); i++) {
    const cells = rows[i].map(c => normalizeHeader(c));
    let score = 0;
    columnHints.forEach(h => { if (cells.some(c => c.includes(h))) score++; });
    if (score > bestScore && score >= 3) {
      bestScore = score;
      headerRowIdx = i;
    }
  }
  if (headerRowIdx < 0) {
    // Fallback: assume first row is header
    headerRowIdx = 0;
  }

  const header = rows[headerRowIdx].map(normalizeHeader);

  // Build column index map
  const findCol = (keywords) => {
    for (const k of keywords) {
      const idx = header.findIndex(h => h.includes(k));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const cols = {
    company: findCol(['entreprise','societe','atelier','raison sociale']),
    name: findCol(['contact','nom prenom','nom du contact','nom','interlocuteur']),
    role: findCol(['fonction','poste','role']),
    city: findCol(['ville','city','localite']),
    department: findCol(['departement','dept','code postal']),
    phone: findCol(['telephone','tel','phone','portable','mobile']),
    email: findCol(['email','e-mail','courriel','mail']),
    website: findCol(['site','insta','instagram','url','web']),
    cnc: findCol(['cnc']),
    specialty: findCol(['specialite','style','activite']),
    source: findCol(['source','origine','canal','trouve']),
    status: findCol(['statut','status','etat','etape'])
  };

  if (cols.company < 0 && cols.name < 0) {
    // Can't identify — fail gracefully
    return [];
  }

  const prospects = [];
  const CNC_LEVEL_WORDS = /^(tres probable|probable|partagee|possible|peu probable)$/;

  for (let i = headerRowIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;

    const joined = row.join(' ').trim();
    if (!joined) continue;

    // ⚠️ Stop completely when we hit a dashboard/legend section — everything after is meta
    if (/📊|légende statut|legende statut|tableau de bord/i.test(joined)) {
      break;
    }

    // Skip methodology or other noise lines
    if (/methodologie|méthodologie/i.test(joined)) continue;

    // Skip dashboard sum rows (À contacter, Email envoyé in column B with empty A…)
    const lowJoined = joined.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (/^(total|a contacter|email envoye|relance \d|appel|rdv pris|accepte|refuse|pas de reponse|taux de conversion)/.test(lowJoined)) continue;

    const company = cols.company >= 0 ? cleanCell(row[cols.company]) : '';
    const name = cols.name >= 0 ? cleanCell(row[cols.name]) : '';

    if (!company && !name) continue;

    // Skip rows where company is just a number
    if (company && /^\d+$/.test(company.trim())) continue;

    // Skip rows where company is ONLY a CNC level word (Partagée, Possible, etc. = legend row)
    const companyNorm = company.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    if (CNC_LEVEL_WORDS.test(companyNorm)) continue;

    const cncRaw = cols.cnc >= 0 ? cleanCell(row[cols.cnc]) : '';
    const cncValue = parseCncLevel(cncRaw);
    const cncNotes = cncRaw && cncRaw.length > 20 ? cncRaw.replace(/^(très probable|probable|partagée|possible|peu probable)\s*[—–\-:]\s*/i, '').trim() : '';

    const statusRaw = cols.status >= 0 ? cleanCell(row[cols.status]) : '';
    const statusValue = parseStatus(statusRaw);

    prospects.push(migrateProspect({
      id: uid(),
      company: company,
      name: name === '—' ? '' : name,
      role: cols.role >= 0 ? cleanCell(row[cols.role]) : '',
      city: cols.city >= 0 ? cleanCell(row[cols.city]) : '',
      department: cols.department >= 0 ? cleanCell(row[cols.department]) : '',
      phone: cols.phone >= 0 ? cleanPhone(row[cols.phone]) : '',
      email: cols.email >= 0 ? cleanEmail(row[cols.email]) : '',
      website: cols.website >= 0 ? cleanCell(row[cols.website]) : '',
      source: cols.source >= 0 ? cleanCell(row[cols.source]) : '',
      cnc: cncValue,
      cncNotes: cncNotes,
      specialty: cols.specialty >= 0 ? cleanCell(row[cols.specialty]) : '',
      status: statusValue || 'todo',
      createdAt: Date.now()
    }));
  }

  return prospects;
}

function cleanCell(v) {
  if (v == null) return '';
  const s = String(v).trim();
  if (s === '—' || s === '-' || s === 'à trouver' || s === 'N/A' || s === 'n/a') return '';
  return s;
}
function cleanPhone(v) {
  const s = cleanCell(v);
  return s; // keep as-is
}
function cleanEmail(v) {
  const s = cleanCell(v);
  if (!s || !s.includes('@')) return '';
  return s;
}

function parseCncLevel(str) {
  if (!str) return '';
  const s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // Ordre important : tester les qualificatifs "tres probable" et "peu probable" AVANT "probable" seul
  if (s.includes('tres probable')) return 'very';
  if (s.includes('peu probable')) return 'unlikely';
  if (s.includes('partagee') || s.includes('fablab')) return 'shared';
  if (s.startsWith('probable') || s.includes(' probable')) return 'probable';
  if (s.includes('possible')) return 'possible';
  return '';
}

function parseStatus(str) {
  if (!str) return '';
  const s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  if (s.includes('a contacter') || s === 'todo') return 'todo';
  if (s.includes('questionnaire')) return 'questionnaire_sent';
  if (s.includes('email envoye')) return 'email_sent';
  if (s.includes('relance 1')) return 'relance_1';
  if (s.includes('relance 2')) return 'relance_2';
  if (s.includes('rdv')) return 'rdv';
  if (s.includes('accepte')) return 'accepted';
  if (s.includes('refuse')) return 'declined';
  if (s.includes('pas de reponse')) return 'no_answer';
  if (s.includes('interesse')) return 'interested';
  if (s.includes('rappeler') || s.includes('callback')) return 'callback';
  if (s.includes('appele')) return 'called';
  return '';
}

function parseCSV(text) {
  const firstLine = text.split(/\r?\n/)[0] || '';
  const sep = firstLine.includes(';') && firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === sep) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* ignore */ }
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c && String(c).trim()));
}

function normalizeHeader(h) {
  return (h || '').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// =====================================================
// Export CSV
// =====================================================
function exportCSV() {
  const headers = [
    'Entreprise','Contact','Fonction','Ville','Département','Téléphone','Email','Site/Insta',
    'CNC','Contexte CNC','Spécialité','Source','Statut','Détail accroche',
    'Dernier appel - date','Dernier appel - mode','Dernier appel - issue','Dernier appel - action',
    'RDV date','RDV heure','Rappel date','Partage fichier',
    'Découverte 1','Découverte 2','Découverte 3','Découverte 4','Découverte 5','Découverte 6','Découverte 7','Découverte 8','Découverte 9','Découverte 10',
    'Notes pitch','Notes libres'
  ];
  const rows = [headers];

  // Helper pour sérialiser une réponse de découverte en texte CSV
  function formatDA(v) {
    if (!v) return '';
    if (typeof v === 'string') return v;
    const parts = [];
    if (v.choices && v.choices.length) parts.push(v.choices.join(' | '));
    if (v.free && v.free.trim()) parts.push(v.free.trim());
    return parts.join(' — ');
  }

  state.prospects.forEach(p => {
    const lp = p.pitches && p.pitches.length ? p.pitches[p.pitches.length - 1] : {};
    const da = lp.discoveryAnswers || {};
    const mode = lp.mode || '';
    const modeLabel = mode === 'discovery' ? 'Écoute & partenariat' : mode === 'sales' ? 'Démarchage commercial' : '';

    let actionLabel = '';
    if (mode === 'sales') {
      actionLabel = lp.cta === 'zoom' ? 'RDV visio' : lp.cta === 'tool' ? 'Outil envoyé' : lp.cta === 'callback' ? 'À rappeler' : lp.cta === 'declined' ? 'Non ferme' : '';
    } else if (mode === 'discovery' && lp.ctaMulti) {
      const labels = { pilot:'Pilote bêta', file:'Fichier CNC', questionnaire:'Questionnaire email', watch:'Veille trimestrielle', none:'Aucun engagement' };
      actionLabel = lp.ctaMulti.map(c => labels[c] || c).join(' + ');
    }

    rows.push([
      p.company, p.name, p.role, p.city, p.department, p.phone, p.email, p.website,
      cncLabel(p.cnc), p.cncNotes, p.specialty, p.source, statusLabel(p.status), p.detail,
      lp.date ? new Date(lp.date).toLocaleDateString('fr-FR') : '',
      modeLabel,
      lp.situation ? situationLabel(lp.situation) : '',
      actionLabel,
      lp.rdv && lp.rdv.date || '',
      lp.rdv && lp.rdv.time || '',
      lp.callbackDate || '',
      lp.fileShareNote || '',
      formatDA(da[0]), formatDA(da[1]), formatDA(da[2]), formatDA(da[3]), formatDA(da[4]),
      formatDA(da[5]), formatDA(da[6]), formatDA(da[7]), formatDA(da[8]), formatDA(da[9]),
      lp.pitchNotes || '', p.notes || ''
    ]);
  });

  const csv = rows.map(r => r.map(cell => {
    const s = (cell == null ? '' : String(cell));
    if (/[",;\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }).join(';')).join('\r\n');

  const BOM = '\ufeff';
  const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `wooder-demarchage-${dateStr}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export téléchargé');
}

function exportJSON() {
  const json = JSON.stringify({
    prospects: state.prospects,
    config: state.config,
    exportedAt: new Date().toISOString()
  }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `wooder-demarchage-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Sauvegarde JSON téléchargée');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data && Array.isArray(data.prospects)) {
          if (confirm(`Restaurer ${data.prospects.length} prospect(s) ? Cela remplacera les données actuelles.`)) {
            state.prospects = data.prospects.map(migrateProspect);
            if (data.config) state.config = { ...state.config, ...data.config };
            save();
            renderList();
            closeModal();
            toast('Sauvegarde restaurée');
          }
        } else toast('Fichier JSON invalide');
      } catch(e) { toast('Erreur de lecture JSON'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function wipeAll() {
  if (!confirm('⚠️ Supprimer TOUS les prospects et tout l\'historique ? Action irréversible.')) return;
  if (!confirm('Vraiment sûr ? Pense à exporter avant.')) return;
  state.prospects = [];
  save();
  closeModal();
  renderList();
  toast('Tout a été effacé');
}

    <div class="form-group">
      <label>URL du questionnaire en ligne <span style="color:var(--ink-3); font-weight:400; font-style:italic;">(optionnel)</span></label>
      <input class="input-field" id="cfg-questionnaireUrl" placeholder="https://votre-nom.github.io/wooder/questionnaire.html" value="${escapeAttr(state.config.questionnaireUrl)}">
      <div style="font-size:11px; color:var(--ink-3); margin-top:4px; line-height:1.4;">L'URL où tu as hébergé <code>questionnaire.html</code>. Utilisée pour envoyer le lien aux menuisiers par email.</div>
    </div>
    <div class="modal-actions">

      <button type="button" class="btn btn-accent btn-block" onclick="saveConfig()">Enregistrer</button>

function saveConfig() {
  state.config.userFirstName = document.getElementById('cfg-firstName').value.trim();

  state.config.userCity = document.getElementById('cfg-city').value.trim();

  save();
  closeModal();
  toast('Infos mises à jour');
}

// =====================================================
// Menu global
// =====================================================
function openMenu() {
  openModal(`
    <div class="modal-title">Menu</div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <button class="btn btn-ghost btn-block" onclick="closeModal(); openConfig()">

      The Wooder — ${state.prospects.length} prospect${state.prospects.length > 1 ? 's' : ''} en base
    </div>
  `);

// =====================================================
// Modal & Toast helpers
// =====================================================
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeUrl(url) {
  if (!url) return '#';
  return url.startsWith('http') ? url : 'https://' + url;
}
function getFirstName(p) {
  if (!p.name) return '[Prénom]';
  return p.name.split(/\s+/)[0];
}
function getLastName(p) {
  if (!p.name) return '';
  const parts = p.name.split(/\s+/);
  return parts.slice(1).join(' ');
}

// =====================================================
// Init
// =====================================================
load();
renderList();

// Onboarding: if first launch, prompt for name
if (state.prospects.length === 0 && !state.config.userLastName && !state.config.userCity) {
  setTimeout(() => {
    openModal(`
      <div class="modal-title">Bienvenue 👋</div>
      <div style="font-size:14px; color:var(--ink-2); line-height:1.55; margin-bottom:16px;">
        Avant de démarrer, renseigne ton prénom, ton nom et ta ville. Ces infos seront injectées automatiquement dans les scripts d'appel.
      </div>
      <div class="form-group"><label>Ton prénom</label><input class="input-field" id="cfg-firstName" value="${escapeAttr(state.config.userFirstName)}" placeholder="Pierre"></div>
      <div class="form-group"><label>Ton nom</label><input class="input-field" id="cfg-lastName" value="${escapeAttr(state.config.userLastName)}" placeholder="Dupont"></div>
      <div class="form-group"><label>Ta ville</label><input class="input-field" id="cfg-city" value="${escapeAttr(state.config.userCity)}" placeholder="Paris"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-accent btn-block" onclick="completeOnboarding()">C'est parti</button>
      </div>
    `);
  }, 300);
}

// Dedicated onboarding handler — robust against any failure in the chain
function completeOnboarding() {
  try {
    const fn = document.getElementById('cfg-firstName');
    const ln = document.getElementById('cfg-lastName');
    const ct = document.getElementById('cfg-city');
    state.config.userFirstName = fn ? fn.value.trim() : '';
    state.config.userLastName = ln ? ln.value.trim() : '';
    state.config.userCity = ct ? ct.value.trim() : '';
    save();
  } catch(e) {
    console.error('Onboarding save failed:', e);
  }
  closeModal();
  // Open import modal after a brief delay so the user sees the transition
  setTimeout(() => {
    try { openImport(); } catch(e) { console.error('Open import failed:', e); }
  }, 250);
}
