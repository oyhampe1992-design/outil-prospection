<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#F5F1EA" />
<title>The Wooder — Démarchage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.1/xlsx.full.min.js" onerror="var s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx@0.20.1/dist/xlsx.full.min.js'; s.onerror=function(){var t=document.createElement('script'); t.src='https://unpkg.com/xlsx@0.20.1/dist/xlsx.full.min.js'; document.head.appendChild(t);}; document.head.appendChild(s);"></script>
<style>
  :root {
    --bg: #F5F1EA;
    --surface: #FFFFFF;
    --surface-2: #FAF7F1;
    --ink: #1C1917;
    --ink-2: #44403C;
    --ink-3: #78716C;
    --line: #E7E2D8;
    --line-strong: #C7BFAE;
    --accent: #B45309;
    --accent-hover: #92400E;
    --accent-soft: #FED7AA;
    --accent-ghost: #FEF3E2;
    --success: #166534;
    --success-soft: #DCFCE7;
    --danger: #991B1B;
    --danger-soft: #FEE2E2;
    --warning: #A16207;
    --warning-soft: #FEF3C7;
    --info: #1E40AF;
    --info-soft: #DBEAFE;
    --cnc-very: #047857;
    --cnc-very-soft: #D1FAE5;
    --cnc-probable: #15803D;
    --cnc-probable-soft: #DCFCE7;
    --cnc-shared: #1E40AF;
    --cnc-shared-soft: #DBEAFE;
    --cnc-possible: #A16207;
    --cnc-possible-soft: #FEF3C7;
    --cnc-unlikely: #57534E;
    --cnc-unlikely-soft: #F5F5F4;
    --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.06);
    --shadow: 0 4px 12px rgba(28, 25, 23, 0.08), 0 1px 2px rgba(28, 25, 23, 0.04);
    --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.12), 0 4px 8px rgba(28, 25, 23, 0.06);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(180, 83, 9, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(180, 83, 9, 0.02) 0%, transparent 50%);
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ——— Header ——— */
  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    padding-top: calc(20px + env(safe-area-inset-top));
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .brand {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .brand em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .back-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .back-btn:active { transform: scale(0.97); background: var(--surface-2); }

  .header-menu-btn {
    width: 40px; height: 40px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .header-menu-btn:active { transform: scale(0.95); }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    padding: 10px 6px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .stat.accent .stat-num { color: var(--accent); }
  .stat.success .stat-num { color: var(--success); }

  /* ——— Search + Filters ——— */
  .controls {
    padding: 14px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  .search {
    position: relative;
    margin-bottom: 10px;
  }
  .search input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
  }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter {
    flex-shrink: 0;
    padding: 7px 13px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  /* ——— Prospect list ——— */
  .list {
    padding: 14px 20px 120px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-2);
    margin-bottom: 8px;
    font-style: italic;
  }

  .prospect-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .prospect-card:active {
    transform: scale(0.99);
    box-shadow: var(--shadow);
  }
  .prospect-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .prospect-name {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .prospect-company {
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .prospect-specialty {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 5px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .prospect-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-3);
    align-items: center;
  }
  .prospect-meta span {
    display: flex; align-items: center; gap: 4px;
  }

  .status {
    flex-shrink: 0;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .status-todo { background: var(--line); color: var(--ink-2); }
  .status-email_sent { background: var(--info-soft); color: var(--info); }
  .status-questionnaire_sent { background: var(--accent-soft); color: var(--accent-hover); }
  .status-relance_1, .status-relance_2 { background: var(--warning-soft); color: var(--warning); }
  .status-called { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
  .status-interested { background: var(--success-soft); color: var(--success); }
  .status-rdv { background: var(--accent-soft); color: var(--accent-hover); }
  .status-accepted { background: var(--success); color: white; }
  .status-callback { background: var(--warning-soft); color: var(--warning); }
  .status-declined { background: var(--danger-soft); color: var(--danger); }
  .status-no_answer { background: var(--surface-2); color: var(--ink-3); border: 1px solid var(--line); }

  .cnc-chip {
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .cnc-chip::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .cnc-very { background: var(--cnc-very-soft); color: var(--cnc-very); }
  .cnc-probable { background: var(--cnc-probable-soft); color: var(--cnc-probable); }
  .cnc-shared { background: var(--cnc-shared-soft); color: var(--cnc-shared); }
  .cnc-possible { background: var(--cnc-possible-soft); color: var(--cnc-possible); }
  .cnc-unlikely { background: var(--cnc-unlikely-soft); color: var(--cnc-unlikely); }

  /* ——— Floating action bar ——— */
  .fab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 70%, rgba(245, 241, 234, 0));
    display: flex;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
    z-index: 8;
    pointer-events: none;
  }
  .fab-bar > * { pointer-events: auto; }

  .btn {
    flex: 1;
    padding: 13px 18px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.005em;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    box-shadow: var(--shadow);
  }
  .btn-primary:active { transform: scale(0.98); background: var(--ink-2); }

  .btn-accent {
    background: var(--accent);
    color: white;
    box-shadow: var(--shadow);
  }
  .btn-accent:active { transform: scale(0.98); background: var(--accent-hover); }

  .btn-ghost {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:active { transform: scale(0.98); background: var(--surface-2); }

  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid transparent;
  }
  .btn-danger:active { transform: scale(0.98); }

  .btn-sm { padding: 9px 14px; font-size: 13px; flex: 0 0 auto; }
  .btn-block { width: 100%; flex: 1 1 auto; }

  /* ——— Views (routing) ——— */
  .view { display: none; }
  .view.active { display: block; }

  /* ——— Detail view ——— */
  .detail {
    padding: 18px 20px 140px;
  }
  .detail-header {
    margin-bottom: 20px;
  }
  .detail-name {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .detail-company {
    font-size: 15px;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .detail-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .info-grid {
    display: grid;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .info-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    align-items: center;
  }
  .info-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .info-value {
    font-size: 14px;
    color: var(--ink);
    word-break: break-word;
    line-height: 1.4;
  }
  .info-value a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .info-value.empty { color: var(--ink-3); font-style: italic; }
  .info-action {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .info-action:active { background: var(--accent-ghost); }

  .section-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .collected-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .collected-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .collected-value {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }
  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    padding: 3px 10px;
    background: var(--accent-ghost);
    color: var(--accent-hover);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }

  .note-field {
    width: 100%;
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .note-field:focus { border-color: var(--accent); }

  .input-field {
    width: 100%;
    padding: 11px 14px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus { border-color: var(--accent); }

  /* ——— Pitch view ——— */
  .pitch {
    padding: 18px 20px 140px;
  }
  .pitch-progress {
    display: flex;
    gap: 3px;
    margin-bottom: 6px;
  }
  .pitch-progress-step {
    flex: 1;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .pitch-progress-step.done { background: var(--accent); }
  .pitch-progress-step.active {
    background: linear-gradient(90deg, var(--accent) 50%, var(--line) 50%);
  }
  .pitch-progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    margin-top: 4px;
  }
  .pitch-progress-labels span { flex: 1; text-align: center; }
  .pitch-progress-labels span.active { color: var(--accent); font-weight: 600; }

  .pitch-step-label {
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .pitch-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .pitch-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .pitch-subtitle {
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .script-box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin-bottom: 14px;
    position: relative;
  }
  .script-box.coach::before {
    content: '— coach —';
    position: absolute;
    top: -9px;
    left: 14px;
    padding: 0 6px;
    background: var(--bg);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
  }
  .script-box::before {
    content: '« à dire »';
    position: absolute;
    top: -9px;
    left: 14px;
    padding: 0 6px;
    background: var(--bg);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.03em;
  }
  .script-box.coach {
    border-left-color: var(--line-strong);
    background: var(--surface-2);
  }
  .script-text {
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    font-style: italic;
  }
  .script-text strong {
    font-weight: 600;
    font-style: normal;
    color: var(--accent-hover);
  }
  .script-box.coach .script-text {
    font-style: normal;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }

  .checklist {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 6px;
    margin-bottom: 14px;
  }
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .checklist-item:active { background: var(--surface-2); }
  .checklist-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line-strong);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .checklist-item.done .checklist-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checklist-item.done .checklist-check::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .checklist-text {
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink);
  }
  .checklist-item.done .checklist-text {
    color: var(--ink-3);
    text-decoration: line-through;
  }

  .question {
    margin-bottom: 18px;
  }
  .question-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
    display: block;
  }
  .question-hint {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 400;
    font-style: italic;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .options.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .option {
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .option:active { transform: scale(0.99); }
  .option.selected {
    background: var(--accent-ghost);
    border-color: var(--accent);
    color: var(--accent-hover);
  }
  .option .check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line-strong);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .option.selected .check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .option.selected .check::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .option.radio .check { border-radius: 50%; }
  .option.radio.selected .check::after {
    border: none;
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    transform: none;
  }

  /* Discovery question cards */
  .discovery-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .discovery-card.asked {
    border-color: var(--accent);
    background: var(--accent-ghost);
  }
  .discovery-card-q {
    font-family: var(--font-display);
    font-size: 15px;
    line-height: 1.4;
    color: var(--ink);
    font-style: italic;
    margin-bottom: 10px;
    padding-right: 80px;
    position: relative;
  }
  .discovery-toggle {
    position: absolute;
    top: -2px;
    right: 0;
    padding: 3px 10px;
    font-family: var(--font-body);
    font-style: normal;
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .discovery-card.asked .discovery-toggle {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .discovery-answer {
    width: 100%;
    padding: 10px 12px;
    font-family: var(--font-body);
    font-size: 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 60px;
    line-height: 1.45;
    transition: border-color 0.15s;
  }
  .discovery-answer:focus { border-color: var(--accent); }
  .discovery-card:not(.asked) .discovery-answer { display: none; }

  /* Chips cliquables pour réponses rapides */
  .discovery-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chip-btn {
    padding: 6px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip-btn:active { transform: scale(0.96); }
  .chip-btn.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* CTA cards */
  .cta-card {
    padding: 16px 18px;
    border: 2px solid var(--line);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .cta-card:active { transform: scale(0.99); }
  .cta-card.selected {
    border-color: var(--accent);
    background: var(--accent-ghost);
    box-shadow: var(--shadow);
  }
  .cta-card-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .cta-card-desc {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.4;
  }

  /* Situation buttons */
  .situation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .situation-btn {
    padding: 14px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .situation-btn:active { transform: scale(0.97); }
  .situation-btn.selected {
    border-color: var(--accent);
    background: var(--accent-ghost);
    color: var(--accent-hover);
  }
  .situation-btn .emoji {
    font-size: 24px;
    line-height: 1;
    margin-bottom: 2px;
  }

  /* Floating objection button */
  .obj-btn {
    position: fixed;
    bottom: 90px;
    right: calc(20px + max(0px, (100vw - 640px) / 2));
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    z-index: 20;
    transition: all 0.15s;
  }
  .obj-btn:active { transform: scale(0.92); }
  .obj-btn::after {
    content: 'Objections';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--ink-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .pitch-actions {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 80%, rgba(245, 241, 234, 0));
    display: flex;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
    z-index: 8;
  }

  /* ——— Modal ——— */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(28, 25, 23, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
  }
  .modal {
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @media (min-width: 640px) {
    .modal { border-radius: var(--radius-lg); }
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 6px;
  }

  /* Objection list in modal */
  .obj-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .obj-q {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .obj-q::before { content: '« '; color: var(--accent); }
  .obj-q::after { content: ' »'; color: var(--accent); }
  .obj-a {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-2);
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .obj-a strong { color: var(--accent-hover); font-weight: 600; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ——— Toast ——— */
  .toast {
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    max-width: calc(100vw - 40px);
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(4px);
  }

  /* ——— Summary view styling ——— */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .summary-card h3 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  .summary-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .summary-item:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-item:first-child { padding-top: 0; }
  .summary-item-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .summary-item-value {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.45;
  }

  /* Decorative */
  .decor-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0;
    color: var(--ink-3);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 12px;
  }
  .decor-line::before, .decor-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line-strong);
  }

  /* Adaptive info banner */
  .adaptive-banner {
    background: linear-gradient(135deg, var(--accent-ghost), var(--surface-2));
    border: 1px solid var(--accent-soft);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--accent-hover);
    line-height: 1.45;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .adaptive-banner-icon {
    font-size: 14px;
    line-height: 1.3;
  }

  /* iOS safe-area */
  @supports (padding: max(0px)) {
    .header { padding-top: max(20px, env(safe-area-inset-top) + 8px); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============================================== -->
  <!-- VIEW 1 : Liste des prospects                   -->
  <!-- ============================================== -->
  <div class="view active" id="view-list">
    <header class="header">
      <div class="header-top">
        <div class="brand">The Wooder <em>démarchage</em></div>
        <button class="header-menu-btn" onclick="openMenu()" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="stat-todo">0</div><div class="stat-label">À faire</div></div>
        <div class="stat success"><div class="stat-num" id="stat-interested">0</div><div class="stat-label">Intéressés</div></div>
        <div class="stat accent"><div class="stat-num" id="stat-rdv">0</div><div class="stat-label">RDV</div></div>
      </div>
    </header>

    <div class="controls">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input type="text" id="search-input" placeholder="Rechercher nom, ville, département…" oninput="renderList()" />
      </div>
      <div class="filters" id="filters">
        <button class="filter active" data-filter="all" onclick="setFilter('all')">Tous</button>
        <button class="filter" data-filter="priority" onclick="setFilter('priority')">⭐ Priorité CNC</button>
        <button class="filter" data-filter="todo" onclick="setFilter('todo')">À contacter</button>
        <button class="filter" data-filter="callback" onclick="setFilter('callback')">À rappeler</button>
        <button class="filter" data-filter="relance" onclick="setFilter('relance')">À relancer</button>
        <button class="filter" data-filter="interested" onclick="setFilter('interested')">Intéressés</button>
        <button class="filter" data-filter="rdv" onclick="setFilter('rdv')">RDV / Accepté</button>
        <button class="filter" data-filter="declined" onclick="setFilter('declined')">Refusés</button>
      </div>
    </div>

    <div class="list" id="prospect-list">
      <!-- rempli dynamiquement -->
    </div>

    <div class="fab-bar">
      <button class="btn btn-ghost" onclick="openImport()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Importer
      </button>
      <button class="btn btn-accent" onclick="openAddProspect()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Ajouter
      </button>
    </div>
  </div>


  <!-- ============================================== -->
  <!-- VIEW 2 : Détail prospect                       -->
  <!-- ============================================== -->
  <div class="view" id="view-detail">
    <header class="header">
      <div class="header-top">
        <button class="back-btn" onclick="showList()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Liste
        </button>
        <div style="flex:1"></div>
        <button class="header-menu-btn" onclick="openProspectActions()" aria-label="Actions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </button>
      </div>
    </header>

    <div class="detail" id="detail-body">
      <!-- rempli dynamiquement -->
    </div>

    <div class="fab-bar">
      <button class="btn btn-accent btn-block" onclick="startPitch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        <span id="pitch-btn-label">Démarrer l'appel</span>
      </button>
    </div>
  </div>


  <!-- ============================================== -->
  <!-- VIEW 3 : Pitch interactif                      -->
  <!-- ============================================== -->
  <div class="view" id="view-pitch">
    <header class="header">
      <div class="header-top">
        <button class="back-btn" onclick="exitPitch()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          Annuler
        </button>
        <div style="flex:1"></div>
        <div id="pitch-prospect-name" style="font-size:13px; color:var(--ink-3); font-weight:500; text-align:right; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
      </div>
      <div class="pitch-progress" id="pitch-progress"></div>
      <div class="pitch-progress-labels" id="pitch-progress-labels"></div>
    </header>

    <div class="pitch" id="pitch-body">
      <!-- rempli dynamiquement -->
    </div>

    <button class="obj-btn" onclick="openObjections()" title="Voir les objections et leurs réponses">🗯</button>

    <div class="pitch-actions">
      <button class="btn btn-ghost" id="pitch-prev" onclick="pitchPrev()" style="flex:0 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <button class="btn btn-accent" id="pitch-next" onclick="pitchNext()">Suivant</button>
    </div>
  </div>

</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// Constants — Script, objections, etc.
// =====================================================

// Questions de découverte, deux jeux selon le mode
// Format : soit string simple (texte libre), soit { q, options, type: 'checklist'|'radio'|'text' }
const DISCOVERY_QUESTIONS_SETS = {
  discovery: [
    { q: "Comment vous récupérez vos clients aujourd'hui — bouche-à-oreille, site web, Instagram, via des architectes / cuisinistes, des salons ?",
      options: ["Bouche-à-oreille", "Site web", "Instagram", "Architectes", "Cuisinistes", "Salons", "Google Maps", "Pages Jaunes", "Autre"],
      type: "checklist" },
    { q: "Quand un client vient avec une idée de meuble sur-mesure, vous partez de quoi pour concevoir ? Un plan, un croquis, un simple échange ?",
      options: ["Plan détaillé", "Croquis", "Simple échange", "Photo d'inspiration", "Relevés sur place", "Cahier des charges"],
      type: "checklist" },
    { q: "Vous dessinez vous-même vos meubles ? Sur quel logiciel — SketchUp, AutoCAD, Fusion 360, Rhino, TopSolid, Polyboard, autre ?",
      options: ["SketchUp", "AutoCAD", "Fusion 360", "Rhino", "TopSolid", "Polyboard", "SolidWorks", "Inventor", "Cabinet Vision", "Papier/crayon", "Je ne dessine pas", "Autre"],
      type: "checklist" },
    { q: "Côté équipement, votre atelier c'est quoi — scie à format, toupie, raboteuse-dégau, CNC, cabine vernis, plaqueuse de chants… ?",
      options: ["Scie à format", "Toupie", "Raboteuse-dégau", "CNC", "Plaqueuse de chants", "Cabine vernis", "Ponceuse à bande", "Défonceuse", "Mortaiseuse", "Perceuse multibroche"],
      type: "checklist" },
    { q: "Si vous avez une CNC, c'est quelle marque / modèle — Biesse, SCM, Felder, Homag, Maslow, Shaper, autre ? Vous en êtes content, vous en changeriez ?",
      options: ["Biesse", "SCM", "Felder", "Homag", "Weeke", "Holz-Her", "Maslow", "Shaper Origin", "Mach", "Pas de CNC", "Autre"],
      type: "checklist" },
    { q: "Votre CNC, elle lit quel type de fichiers ? Ou si vous n'en avez pas, comment vous gérez votre débit et vos perçages ?",
      options: ["DXF", "DWG", "G-code", "WoodWOP", "Xilog", "Biesseworks", "MPR", "Alphacam", "VCarve / Aspire", "Débit manuel", "Sous-traite la découpe", "Via fablab / CNC partagée", "Autre"],
      type: "checklist" },
    { q: "Les ferrures comme Clamex, Cabineo, excentriques, vous les choisissez comment pour un projet sur-mesure ?",
      type: "text" },
    { q: "C'est quoi votre principal casse-tête aujourd'hui — trouver des clients, ou la partie chiffrage / fichiers / modélisation ?",
      options: ["Trouver des clients", "Chiffrage / devis", "Fichiers CNC", "Modélisation 3D", "Gestion atelier", "Relances paiement", "Tout à la fois"],
      type: "checklist" },
    { q: "Combien de meubles sur-mesure vous sortez par mois ? Vous avez du mou ou vous êtes saturé ?",
      options: ["0-2 par mois", "3-5 par mois", "5-10 par mois", "10+ par mois", "Saturé", "Du mou"],
      type: "checklist" },
    { q: "Comment vous faites vos devis pour les particuliers ? Combien de temps ça vous prend pour un meuble sur-mesure ?",

// State & persistence
// =====================================================
const STORAGE_KEY = 'wooder_demarchage_v2';
const LEGACY_KEY = 'wooder_demarchage_v1';
let state = {
  prospects: [],
  filter: 'all',
  currentId: null,
  pitchStep: 0,
  pitchDraft: null,
  config: {
    userFirstName: 'Pierre',
    userLastName: '',
    userCity: '',
    questionnaireUrl: '',
  }
};

function uid() { return 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.prospects)) {
        state.prospects = parsed.prospects;
      }
      if (parsed && parsed.config) {
        state.config = { ...state.config, ...parsed.config };
      }
    } else {
      // Migration from v1
      const legacy = localStorage.getItem(LEGACY_KEY);
      if (legacy) {
        try {
          const parsedLegacy = JSON.parse(legacy);
          if (parsedLegacy && Array.isArray(parsedLegacy.prospects)) {
            state.prospects = parsedLegacy.prospects.map(migrateProspect);
            save();
          }
        } catch(e) {}
      }
    }
  } catch(e) { console.warn('Load failed:', e); }

  // Ensure schema
  state.prospects = state.prospects.map(migrateProspect);
}

function migrateProspect(p) {
  return {
    id: p.id || uid(),
    name: p.name || '',
    company: p.company || '',
    role: p.role || '',
    city: p.city || '',
    department: p.department || '',
    phone: p.phone || '',
    email: p.email || '',
    website: p.website || '',
    source: p.source || '',
    cnc: p.cnc || '',          // 'very' | 'probable' | 'shared' | 'possible' | 'unlikely' | ''
    cncNotes: p.cncNotes || '',
    specialty: p.specialty || '',
    detail: p.detail || '',     // détail perso pour l'accroche
    status: p.status || 'todo',
    notes: p.notes || '',
    createdAt: p.createdAt || Date.now(),
    lastContact: p.lastContact || null,
    pitches: Array.isArray(p.pitches) ? p.pitches : [],
  };
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      prospects: state.prospects,
      config: state.config
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function getCurrentProspects() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let list = [...state.prospects];

  // Filter
  const f = state.filter;
  if (f === 'priority') {
    list = list.filter(p => ['very','probable','shared'].includes(p.cnc) && !['declined','accepted'].includes(p.status));
  } else if (f === 'relance') {
    list = list.filter(p => ['email_sent','relance_1','relance_2','no_answer'].includes(p.status));
  } else if (f === 'rdv') {
    list = list.filter(p => ['rdv','accepted'].includes(p.status));
  } else if (f !== 'all') {
    list = list.filter(p => p.status === f);
  }

  if (q) {
    list = list.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.company || '').toLowerCase().includes(q) ||
      (p.city || '').toLowerCase().includes(q) ||
      (p.department || '').toLowerCase().includes(q) ||
      (p.specialty || '').toLowerCase().includes(q) ||
      (p.email || '').toLowerCase().includes(q)
    );
  }

  // Sort: priority CNC first among todo, then by status order, then by name
  const statusOrder = { rdv:0, accepted:0, interested:1, callback:2, relance_1:3, relance_2:3, email_sent:4, no_answer:5, todo:6, called:7, declined:8 };
  const cncOrder = { very:0, probable:1, shared:2, possible:3, unlikely:4, '':5 };
  list.sort((a, b) => {
    const sa = statusOrder[a.status] ?? 9;
    const sb = statusOrder[b.status] ?? 9;
    if (sa !== sb) return sa - sb;
    const ca = cncOrder[a.cnc] ?? 5;
    const cb = cncOrder[b.cnc] ?? 5;
    if (ca !== cb) return ca - cb;
    return (a.company || a.name || '').localeCompare(b.company || b.name || '');
  });

  return list;
}

  return {

    questionnaire_sent: 'Questionnaire envoyé',
    relance_1: 'Relance 1',
    relance_2: 'Relance 2',
    called: 'Appelé',
    no_answer: 'Pas de réponse',
    callback: 'À rappeler',
    interested: 'Intéressé',
    rdv: 'RDV pris',
    accepted: 'Accepté ✓',
    declined: 'Refusé'
  }[s] || s;
}

function cncLabel(c) {

    very: 'CNC très probable',
    probable: 'CNC probable',
    shared: 'CNC partagée',
    possible: 'CNC possible',
    unlikely: 'CNC peu probable'

}

function cncShort(c) {

    probable: 'CNC ★★',
    shared: 'CNC fablab',
    possible: 'CNC ?',
    unlikely: 'CNC –'

}

      <div class="prospect-meta">
        ${p.city ? `<span>📍 ${escapeHtml(p.city)}${p.department ? ' (' + escapeHtml(p.department) + ')' : ''}</span>` : ''}
        ${p.cnc ? `<span class="cnc-chip cnc-${p.cnc}">${cncShort(p.cnc)}</span>` : ''}

function renderCollectedBlock(pitch) {
  const rows = [];
  const mode = pitch.mode;
  const modeLabel = mode === 'discovery' ? '🎧 Écoute & partenariat' : mode === 'sales' ? '📞 Démarchage commercial' : '';
  if (modeLabel) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Mode</div><div class="summary-item-value"><strong>${modeLabel}</strong></div></div>`);
  }
  if (pitch.situation) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Situation</div><div class="summary-item-value">${escapeHtml(situationLabel(pitch.situation))}</div></div>`);
  }
  if (pitch.discoveryAnswers && Object.keys(pitch.discoveryAnswers).length) {
    const qSet = DISCOVERY_QUESTIONS_SETS[mode] || DISCOVERY_QUESTIONS_SETS.sales;
    const qas = Object.entries(pitch.discoveryAnswers)
      .filter(([_, v]) => {
        if (!v) return false;
        if (typeof v === 'string') return v.trim();
        return (v.choices && v.choices.length) || (v.free && v.free.trim());
      })
      .map(([idx, v]) => {
        const qObj = qSet[parseInt(idx)];
        const qText = typeof qObj === 'string' ? qObj : (qObj ? qObj.q : '');
        const ans = typeof v === 'string' ? { choices: [], free: v } : v;
        const chips = ans.choices && ans.choices.length
          ? `<div class="chip-list" style="margin-top:4px;">${ans.choices.map(c => `<div class="chip">${escapeHtml(c)}</div>`).join('')}</div>`
          : '';
        const free = ans.free && ans.free.trim() ? `<div style="margin-top:4px;">${escapeHtml(ans.free)}</div>` : '';
        return `<div style="margin-bottom:10px;"><div style="font-size:12px; font-style:italic; color:var(--ink-3);">« ${escapeHtml(qText)} »</div>${chips}${free}</div>`;
      })
      .join('');
    if (qas) rows.push(`<div class="summary-item"><div class="summary-item-label">${mode === 'discovery' ? 'Écoute' : 'Découverte'}</div><div class="summary-item-value">${qas}</div></div>`);
  }
  if (pitch.objectionsHit && pitch.objectionsHit.length) {
    const oSet = OBJECTIONS_SETS[mode] || OBJECTIONS_SETS.sales;
    rows.push(`<div class="summary-item"><div class="summary-item-label">Objections rencontrées</div><div class="summary-item-value"><div class="chip-list">${pitch.objectionsHit.map(i => `<div class="chip">${escapeHtml((oSet[i] || {q:''}).q.slice(0, 40))}…</div>`).join('')}</div></div></div>`);
  }
  // Sales CTA (single)
  if (pitch.cta && mode !== 'discovery') {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Action convenue</div><div class="summary-item-value"><strong>${pitch.cta === 'zoom' ? 'RDV visio' : pitch.cta === 'tool' ? 'Accès outil gratuit' : pitch.cta === 'callback' ? 'Rappeler plus tard' : pitch.cta === 'declined' ? 'Non ferme' : escapeHtml(pitch.cta)}</strong></div></div>`);
  }
  // Discovery CTA (multi)
  if (pitch.ctaMulti && pitch.ctaMulti.length && mode === 'discovery') {
    const labels = { pilot:'🤝 Pilote bêta', file:'📂 Fichier CNC', questionnaire:'📧 Questionnaire', watch:'📨 Veille trimestrielle', none:'Aucun engagement' };
    rows.push(`<div class="summary-item"><div class="summary-item-label">Engagements</div><div class="summary-item-value"><div class="chip-list">${pitch.ctaMulti.map(c => `<div class="chip">${labels[c] || c}</div>`).join('')}</div></div></div>`);
  }
  if (pitch.fileShareNote) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Partage fichier</div><div class="summary-item-value">${escapeHtml(pitch.fileShareNote)}</div></div>`);
  }
  if (pitch.rdv && pitch.rdv.date) {
    const fmt = new Date(pitch.rdv.date + 'T' + (pitch.rdv.time || '09:00')).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'});
    rows.push(`<div class="summary-item"><div class="summary-item-label">Rendez-vous</div><div class="summary-item-value">${fmt}</div></div>`);
  }
  if (pitch.callbackDate) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">À rappeler</div><div class="summary-item-value">${new Date(pitch.callbackDate).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})}</div></div>`);
  }
  if (pitch.pitchNotes) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Notes</div><div class="summary-item-value">${escapeHtml(pitch.pitchNotes)}</div></div>`);
  }
  if (rows.length === 0) return '';

  return `
    <div class="section-title">Dernier appel — ${new Date(pitch.date).toLocaleDateString('fr-FR')}</div>
    <div class="summary-card">
      ${rows.join('')}
    </div>
  `;
}

function sendQuestionnaireEmail(id) {

  if (!state.config.questionnaireUrl) {
    closeModal();
    openModal(`

      </div>
      <div class="modal-actions">

        <button class="btn btn-accent btn-block" onclick="closeModal(); openConfig();">Configurer maintenant</button>
      </div>

  if (!p.email) {

      <div style="font-size:14px; color:var(--ink-2); line-height:1.6; margin-bottom:14px;">

      </div>

    return;
  }

  const userFirstName = state.config.userFirstName || 'Pierre';
  const userLastName = state.config.userLastName || '';
  const userCity = state.config.userCity || '';
  const firstName = getFirstName(p) || '';

  // URL avec override du destinataire (pour que les réponses reviennent à Pierre)
  const qUrl = state.config.questionnaireUrl;
  // Note : on ne met PAS l'email de Pierre dans l'URL (il est déjà configuré dans le questionnaire)

  const subject = `${userFirstName}${userLastName ? ' ' + userLastName : ''} — 5 min pour nous aider à construire l'outil rêvé des menuisiers ?`;

  const body = [
    `Bonjour${firstName ? ' ' + firstName : ''},`,
    ``,
    `Je suis ${userFirstName}${userLastName ? ' ' + userLastName : ''}, menuisier${userCity ? ' à ' + userCity : ''}. Je développe The Wooder — une plateforme de mise en relation entre particuliers et menuisiers, avec les outils de fabrication intégrés — configurateur 3D, fichiers de fab, débit, ferrures —.`,
    ``,
    `Pour être sûr de construire la bonne chose, j'ai besoin de l'avis de pros comme vous. J'ai préparé un petit questionnaire — ça prend 5 minutes, et vos réponses m'aideront vraiment.`,
    ``,
    `Voici le lien :`,
    qUrl,
    ``,
    `Merci infiniment pour votre temps.`,
    ``,
    `À bientôt,`,
    `${userFirstName}${userLastName ? ' ' + userLastName : ''}`,
    `— The Wooder`
  ].join('\n');

  const mailto = `mailto:${p.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  // Update status and save
  p.status = 'questionnaire_sent';
  p.lastContact = Date.now();
  save();

  // Open mail client
  window.location.href = mailto;

  closeModal();
  toast('Mail composé — statut mis à jour');
  setTimeout(() => renderDetail(), 300);
}

function setStatus(s) {

// =====================================================
// Pitch flow
// =====================================================
const PITCH_STEPS = [
  { id: 'mode',      label: 'Mode' },
  { id: 'prep',      label: 'Prépa' },
  { id: 'opening',   label: 'Ouverture' },
  { id: 'hook',      label: 'Accroche' },
  { id: 'pitch',     label: 'Pitch' },
  { id: 'discovery', label: 'Écoute' },
  { id: 'cta',       label: 'CTA' },
  { id: 'closing',   label: 'Clôture' }
];

function startPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  state.pitchStep = 0;
  state.pitchDraft = {
    date: Date.now(),
    mode: '',                // 'discovery' | 'sales'
    situation: '',           // answered / voicemail / gatekeeper / no_answer
    prepChecked: [],         // indices of checked prep items
    discoveryAnswers: {},    // { idx: text }
    discoveryAsked: [],      // indices of asked questions
    objectionsHit: [],       // indices of objections encountered
    cta: '',                 // zoom / tool / callback / declined (sales) | pilot / file / watch / none (discovery)
    ctaMulti: [],            // multi-select for discovery mode
    rdv: { date: '', time: '10:00' },
    callbackDate: '',
    fileShareNote: '',       // pour le CTA "partage de fichier" en mode écoute
    outcome: '',             // final status to apply
    pitchNotes: ''
  };
  document.getElementById('pitch-prospect-name').textContent = p.company || p.name;
  renderPitch();
  showView('view-pitch');
}

function exitPitch() {
  if (!confirm('Abandonner cet appel ? Les notes saisies seront perdues.')) return;
  state.pitchDraft = null;
  state.pitchStep = 0;
  showDetail(state.currentId);
}

function pitchNext() {
  const draft = state.pitchDraft;
  const step = PITCH_STEPS[state.pitchStep].id;

  // Mode step: require mode selection
  if (step === 'mode') {
    if (!draft.mode) {
      toast('Choisis un mode d\'appel');
      return;
    }
  }

  // Branch after opening: if gatekeeper/voicemail/no_answer, skip to closing/finish
  if (step === 'opening') {
    if (draft.situation === 'voicemail') {
      draft.outcome = 'called';
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'closing');
      renderPitch();
      return;
    }
    if (draft.situation === 'gatekeeper') {
      toast('Utilise le script barrage — dès que tu obtiens la personne, reprends « Il a décroché »');
      return;
    }
    if (draft.situation === 'no_answer') {
      draft.outcome = 'no_answer';
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'closing');
      renderPitch();
      return;
    }
    if (!draft.situation) {
      toast('Indique ce qui s\'est passé au décroché');
      return;
    }
  }

  // From CTA step: validate CTA chosen
  if (step === 'cta') {
    if (draft.mode === 'sales' && !draft.cta) {
      toast('Choisis l\'issue de l\'appel');
      return;
    }
    if (draft.mode === 'discovery' && draft.ctaMulti.length === 0) {
      toast('Choisis au moins une option (ou « Aucun engagement »)');
      return;
    }
  }

  if (step === 'closing') {
    finishPitch();
    return;
  }

  state.pitchStep++;
  if (state.pitchStep >= PITCH_STEPS.length) {
    finishPitch();
    return;
  }
  renderPitch();
}

function pitchPrev() {
  if (state.pitchStep > 0) {
    // Handle jump-back from closing if we skipped steps
    const currentStep = PITCH_STEPS[state.pitchStep].id;
    if (currentStep === 'closing' && ['voicemail','no_answer'].includes(state.pitchDraft.situation)) {
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'opening');
    } else {
      state.pitchStep--;
    }
    renderPitch();
  } else {
    exitPitch();
  }
}

function finishPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  const draft = state.pitchDraft;

  // Determine final status
  let finalStatus = p.status;

  if (draft.mode === 'sales') {
    if (draft.cta === 'zoom' || draft.cta === 'tool') {
      finalStatus = 'interested';
      if (draft.rdv.date) finalStatus = 'rdv';
    } else if (draft.cta === 'callback') {
      finalStatus = 'callback';
    } else if (draft.cta === 'declined') {
      finalStatus = 'declined';
    } else if (draft.situation === 'voicemail') {
      finalStatus = 'called';
    } else if (draft.situation === 'no_answer') {
      finalStatus = 'no_answer';
    } else if (draft.situation === 'answered') {
      finalStatus = 'called';
    }
  } else if (draft.mode === 'discovery') {
    // En mode écoute, le statut reflète le niveau d'engagement obtenu
    const ctas = draft.ctaMulti;
    if (ctas.includes('pilot')) {
      finalStatus = 'interested'; // le plus engageant
    } else if (ctas.includes('file')) {
      finalStatus = 'interested';
    } else if (ctas.includes('questionnaire')) {
      finalStatus = 'interested'; // va recevoir le questionnaire, engagement fort
    } else if (ctas.includes('watch')) {
      finalStatus = 'callback';
    } else if (ctas.includes('none')) {
      finalStatus = 'called';
    } else if (draft.situation === 'voicemail') {
      finalStatus = 'called';
    } else if (draft.situation === 'no_answer') {
      finalStatus = 'no_answer';
    } else if (draft.situation === 'answered') {
      finalStatus = 'called';
    }
  }
  draft.outcome = finalStatus;

  p.pitches = p.pitches || [];
  p.pitches.push({ ...draft, date: Date.now() });
  p.status = finalStatus;
  p.lastContact = Date.now();

  save();
  state.pitchDraft = null;
  state.pitchStep = 0;
  showDetail(p.id);
  toast('Appel enregistré ✓');
}

function renderPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  const step = PITCH_STEPS[state.pitchStep];
  const draft = state.pitchDraft;

  // Progress bar
  const progressEl = document.getElementById('pitch-progress');
  progressEl.innerHTML = PITCH_STEPS.map((s, i) => {
    let cls = '';
    if (i < state.pitchStep) cls = 'done';
    else if (i === state.pitchStep) cls = 'active';
    return `<div class="pitch-progress-step ${cls}"></div>`;
  }).join('');

  const labelsEl = document.getElementById('pitch-progress-labels');
  labelsEl.innerHTML = PITCH_STEPS.map((s, i) => `<span class="${i === state.pitchStep ? 'active' : ''}">${s.label}</span>`).join('');

            <label class="question-label">Date</label>

        recapItems.push(`<div class="summary-item"><div class="summary-item-label">Engagements</div><div class="summary-item-value">${draft.ctaMulti.map(c => `<span class="chip">${ctaMultiLabels[c] || c}</span>`).join(' ')}</div></div>`);
      }
      if (draft.rdv && draft.rdv.date) recapItems.push(`<div class="summary-item"><div class="summary-item-label">RDV</div><div class="summary-item-value">${draft.rdv.date} à ${draft.rdv.time}</div></div>`);
      if (draft.callbackDate) recapItems.push(`<div class="summary-item"><div class="summary-item-label">Rappel</div><div class="summary-item-value">${draft.callbackDate}</div></div>`);
      if (draft.fileShareNote) recapItems.push(`<div class="summary-item"><div class="summary-item-label">Fichier</div><div class="summary-item-value">${escapeHtml(draft.fileShareNote)}</div></div>`);
      const answeredCount = Object.values(draft.discoveryAnswers).filter(v => {
        if (!v) return false;
        if (typeof v === 'string') return v.trim();
        return (v.choices && v.choices.length) || (v.free && v.free.trim());
      }).length;
      if (answeredCount) recapItems.push(`<div class="summary-item"><div class="summary-item-label">Écoute</div><div class="summary-item-value">${answeredCount} réponse${answeredCount>1?'s':''} notée${answeredCount>1?'s':''}</div></div>`);
      if (draft.objectionsHit.length) recapItems.push(`<div class="summary-item"><div class="summary-item-label">Objections</div><div class="summary-item-value">${draft.objectionsHit.length} rencontrée${draft.objectionsHit.length>1?'s':''}</div></div>`);

      return `
        <div class="pitch-step-label">Étape 7 — Clôture · 30 secondes${mode === 'discovery' ? ' · 🎧' : ' · 📞'}</div>
        <div class="pitch-title">${wasDeclined ? 'Laisser la <em>porte ouverte</em>' : wasVoicemail || wasNoAnswer ? 'Noter &amp; <em>relancer</em>' : 'Clore en <em>beauté</em>'}</div>

        ${scriptContent}

        <div class="section-title">Notes sur l'appel</div>
        <textarea class="note-field" placeholder="Ce que tu veux te souvenir (ton de voix, infos business, next steps…)" oninput="state.pitchDraft.pitchNotes = this.value">${escapeHtml(draft.pitchNotes || '')}</textarea>

        <div class="decor-line">✦ fin ✦</div>

        <div class="summary-card">
          <h3>Récapitulatif</h3>
          ${recapItems.join('')}
        </div>
      `;
    }
  };

  body.innerHTML = renderers[step.id]();
}

// Helper — choix du mode de réponse (téléphone vs questionnaire)
function chooseIntention(choice) {
  if (choice === 'phone') {
    // Continuer normalement vers la découverte
    state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'discovery');
    renderPitch();
  } else if (choice === 'questionnaire') {
    // Pré-cocher le CTA questionnaire et sauter directement au CTA
    if (!state.pitchDraft.ctaMulti.includes('questionnaire')) {
      state.pitchDraft.ctaMulti.push('questionnaire');
    }
    state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'cta');
    renderPitch();
    toast('On saute la découverte — tu enverras le questionnaire après');
  }
}

// Helper — multi-select CTA for discovery mode
function toggleCtaMulti(c) {
  const arr = state.pitchDraft.ctaMulti;
  const idx = arr.indexOf(c);
  if (idx >= 0) {
    arr.splice(idx, 1);
  } else {
    // If choosing 'none', clear the others; if choosing another, remove 'none'
    if (c === 'none') {
      state.pitchDraft.ctaMulti = ['none'];
    } else {
      const noneIdx = arr.indexOf('none');
      if (noneIdx >= 0) arr.splice(noneIdx, 1);
      arr.push(c);
    }
  }
  renderPitch();
}

function getDiscoveryAnswer(answers, idx) {
  const a = answers[idx];
  if (!a) return { choices: [], free: '' };
  if (typeof a === 'string') return { choices: [], free: a };
  return { choices: a.choices || [], free: a.free || '' };
}

function updateDiscoveryAnswer(i, v) {
  const cur = state.pitchDraft.discoveryAnswers[i];
  if (cur && typeof cur === 'object') {
    cur.free = v;
  } else {
    state.pitchDraft.discoveryAnswers[i] = {
      choices: typeof cur === 'string' ? [] : [],
      free: v
    };
  }
  // Auto-mark as asked when content typed
  if (v && !state.pitchDraft.discoveryAsked.includes(i)) {
    state.pitchDraft.discoveryAsked.push(i);
  }
}

function toggleDiscoveryChoice(i, opt, type) {
  let cur = state.pitchDraft.discoveryAnswers[i];
  if (!cur || typeof cur !== 'object') {
    state.pitchDraft.discoveryAnswers[i] = {
      choices: [],
      free: typeof cur === 'string' ? cur : ''
    };
    cur = state.pitchDraft.discoveryAnswers[i];
  }
  if (type === 'radio') {
    // Single-select : si déjà sélectionné, on désélectionne ; sinon on remplace
    cur.choices = cur.choices.includes(opt) ? [] : [opt];
  } else {
    // Checklist : toggle
    const idx = cur.choices.indexOf(opt);
    if (idx >= 0) cur.choices.splice(idx, 1);
    else cur.choices.push(opt);
  }
  // Auto-mark as asked
  if (!state.pitchDraft.discoveryAsked.includes(i)) {
    state.pitchDraft.discoveryAsked.push(i);
  }
  renderPitch();
}

  state.pitchDraft.cta = c;
  renderPitch();
