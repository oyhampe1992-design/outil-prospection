<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#F5F1EA" />
<title>The Wooder — Démarchage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.1/xlsx.full.min.js" onerror="var s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx@0.20.1/dist/xlsx.full.min.js'; s.onerror=function(){var t=document.createElement('script'); t.src='https://unpkg.com/xlsx@0.20.1/dist/xlsx.full.min.js'; document.head.appendChild(t);}; document.head.appendChild(s);"></script>
<style>
  :root {
    --bg: #F5F1EA;
    --surface: #FFFFFF;
    --surface-2: #FAF7F1;
    --ink: #1C1917;
    --ink-2: #44403C;
    --ink-3: #78716C;
    --line: #E7E2D8;
    --line-strong: #C7BFAE;
    --accent: #B45309;
    --accent-hover: #92400E;
    --accent-soft: #FED7AA;
    --accent-ghost: #FEF3E2;
    --success: #166534;
    --success-soft: #DCFCE7;
    --danger: #991B1B;
    --danger-soft: #FEE2E2;
    --warning: #A16207;
    --warning-soft: #FEF3C7;
    --info: #1E40AF;
    --info-soft: #DBEAFE;
    --cnc-very: #047857;
    --cnc-very-soft: #D1FAE5;
    --cnc-probable: #15803D;
    --cnc-probable-soft: #DCFCE7;
    --cnc-shared: #1E40AF;
    --cnc-shared-soft: #DBEAFE;
    --cnc-possible: #A16207;
    --cnc-possible-soft: #FEF3C7;
    --cnc-unlikely: #57534E;
    --cnc-unlikely-soft: #F5F5F4;
    --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.06);
    --shadow: 0 4px 12px rgba(28, 25, 23, 0.08), 0 1px 2px rgba(28, 25, 23, 0.04);
    --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.12), 0 4px 8px rgba(28, 25, 23, 0.06);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(180, 83, 9, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(180, 83, 9, 0.02) 0%, transparent 50%);
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ——— Header ——— */
  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    padding-top: calc(20px + env(safe-area-inset-top));
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .brand {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .brand em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .back-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .back-btn:active { transform: scale(0.97); background: var(--surface-2); }

  .header-menu-btn {
    width: 40px; height: 40px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .header-menu-btn:active { transform: scale(0.95); }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    padding: 10px 6px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .stat.accent .stat-num { color: var(--accent); }
  .stat.success .stat-num { color: var(--success); }

  /* ——— Search + Filters ——— */
  .controls {
    padding: 14px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  .search {
    position: relative;
    margin-bottom: 10px;
  }
  .search input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
  }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter {
    flex-shrink: 0;
    padding: 7px 13px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  /* ——— Prospect list ——— */
  .list {
    padding: 14px 20px 120px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-2);
    margin-bottom: 8px;
    font-style: italic;
  }

  .prospect-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .prospect-card:active {
    transform: scale(0.99);
    box-shadow: var(--shadow);
  }
  .prospect-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .prospect-name {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .prospect-company {
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .prospect-specialty {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 5px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .prospect-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-3);
    align-items: center;
  }
  .prospect-meta span {
    display: flex; align-items: center; gap: 4px;
  }

  .status {
    flex-shrink: 0;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .status-todo { background: var(--line); color: var(--ink-2); }
  .status-email_sent { background: var(--info-soft); color: var(--info); }
  .status-relance_1, .status-relance_2 { background: var(--warning-soft); color: var(--warning); }
  .status-called { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
  .status-interested { background: var(--success-soft); color: var(--success); }
  .status-rdv { background: var(--accent-soft); color: var(--accent-hover); }
  .status-accepted { background: var(--success); color: white; }
  .status-callback { background: var(--warning-soft); color: var(--warning); }
  .status-declined { background: var(--danger-soft); color: var(--danger); }
  .status-no_answer { background: var(--surface-2); color: var(--ink-3); border: 1px solid var(--line); }

  .cnc-chip {
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .cnc-chip::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .cnc-very { background: var(--cnc-very-soft); color: var(--cnc-very); }
  .cnc-probable { background: var(--cnc-probable-soft); color: var(--cnc-probable); }
  .cnc-shared { background: var(--cnc-shared-soft); color: var(--cnc-shared); }
  .cnc-possible { background: var(--cnc-possible-soft); color: var(--cnc-possible); }
  .cnc-unlikely { background: var(--cnc-unlikely-soft); color: var(--cnc-unlikely); }

  /* ——— Floating action bar ——— */
  .fab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 70%, rgba(245, 241, 234, 0));
    display: flex;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
    z-index: 8;
    pointer-events: none;
  }
  .fab-bar > * { pointer-events: auto; }

  .btn {
    flex: 1;
    padding: 13px 18px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.005em;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    box-shadow: var(--shadow);
  }
  .btn-primary:active { transform: scale(0.98); background: var(--ink-2); }

  .btn-accent {
    background: var(--accent);
    color: white;
    box-shadow: var(--shadow);
  }
  .btn-accent:active { transform: scale(0.98); background: var(--accent-hover); }

  .btn-ghost {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:active { transform: scale(0.98); background: var(--surface-2); }

  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid transparent;
  }
  .btn-danger:active { transform: scale(0.98); }

  .btn-sm { padding: 9px 14px; font-size: 13px; flex: 0 0 auto; }
  .btn-block { width: 100%; flex: 1 1 auto; }

  /* ——— Views (routing) ——— */
  .view { display: none; }
  .view.active { display: block; }

  /* ——— Detail view ——— */
  .detail {
    padding: 18px 20px 140px;
  }
  .detail-header {
    margin-bottom: 20px;
  }
  .detail-name {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .detail-company {
    font-size: 15px;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .detail-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .info-grid {
    display: grid;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .info-row {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    align-items: center;
  }
  .info-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .info-value {
    font-size: 14px;
    color: var(--ink);
    word-break: break-word;
    line-height: 1.4;
  }
  .info-value a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .info-value.empty { color: var(--ink-3); font-style: italic; }
  .info-action {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .info-action:active { background: var(--accent-ghost); }

  .section-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .collected-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .collected-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .collected-value {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }
  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    padding: 3px 10px;
    background: var(--accent-ghost);
    color: var(--accent-hover);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }

  .note-field {
    width: 100%;
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .note-field:focus { border-color: var(--accent); }

  .input-field {
    width: 100%;
    padding: 11px 14px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus { border-color: var(--accent); }

  /* ——— Pitch view ——— */
  .pitch {
    padding: 18px 20px 140px;
  }
  .pitch-progress {
    display: flex;
    gap: 3px;
    margin-bottom: 6px;
  }
  .pitch-progress-step {
    flex: 1;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .pitch-progress-step.done { background: var(--accent); }
  .pitch-progress-step.active {
    background: linear-gradient(90deg, var(--accent) 50%, var(--line) 50%);
  }
  .pitch-progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    margin-top: 4px;
  }
  .pitch-progress-labels span { flex: 1; text-align: center; }
  .pitch-progress-labels span.active { color: var(--accent); font-weight: 600; }

  .pitch-step-label {
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .pitch-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .pitch-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .pitch-subtitle {
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .script-box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin-bottom: 14px;
    position: relative;
  }
  .script-box.coach::before {
    content: '— coach —';
    position: absolute;
    top: -9px;
    left: 14px;
    padding: 0 6px;
    background: var(--bg);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
  }
  .script-box::before {
    content: '« à dire »';
    position: absolute;
    top: -9px;
    left: 14px;
    padding: 0 6px;
    background: var(--bg);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.03em;
  }
  .script-box.coach {
    border-left-color: var(--line-strong);
    background: var(--surface-2);
  }
  .script-text {
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    font-style: italic;
  }
  .script-text strong {
    font-weight: 600;
    font-style: normal;
    color: var(--accent-hover);
  }
  .script-box.coach .script-text {
    font-style: normal;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }

  .checklist {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 6px;
    margin-bottom: 14px;
  }
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .checklist-item:active { background: var(--surface-2); }
  .checklist-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line-strong);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .checklist-item.done .checklist-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checklist-item.done .checklist-check::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .checklist-text {
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink);
  }
  .checklist-item.done .checklist-text {
    color: var(--ink-3);
    text-decoration: line-through;
  }

  .question {
    margin-bottom: 18px;
  }
  .question-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
    display: block;
  }
  .question-hint {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 400;
    font-style: italic;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .options.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .option {
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink);

  /* Discovery question cards */
  .discovery-card {

  @keyframes fadeIn {

  /* ——— Toast ——— */
  .toast {
    position: fixed;

  /* ——— Summary view styling ——— */
  .summary-card {

  /* Decorative */
  .decor-line {
    display: flex;
    align-items: center;

  .decor-line::before, .decor-line::after {

  /* Adaptive info banner */

  }

  /* iOS safe-area */
  @supports (padding: max(0px)) {
    .header { padding-top: max(20px, env(safe-area-inset-top) + 8px); }
  }
</style>

<div class="app">

<script>
// =====================================================
// Constants — Script, objections, etc.
// =====================================================
const DISCOVERY_QUESTIONS = [
  "Vous travaillez plutôt en direct client, ou via architectes / cuisinistes ?",
  "Votre CNC, c'est quoi ? Vous en êtes content ?",
  "Aujourd'hui, c'est quoi votre principal casse-tête — trouver des clients, ou gérer la partie chiffrage / fichiers ?",
  "Combien de meubles sur-mesure vous sortez par mois en moyenne ?",
  "Vous avez déjà testé d'autres plateformes du style ManoMano Pro, Fabmake, Houzz ? Qu'est-ce qui vous a freiné ?"
];

const OBJECTIONS = [
  {
    q: "Je n'ai pas besoin de clients, mon carnet de commandes est plein pour 6 mois.",
    a: "Félicitations, c'est le meilleur problème à avoir. Justement, The Wooder peut vous servir <strong>plus tard comme variable d'ajustement</strong> quand un trou apparaît, ou pour trier des projets plus rentables. L'inscription est gratuite en phase bêta — je vous mets dedans sans engagement ?"
  },
  {
    q: "Les plateformes me prennent trop de commission.",
    a: "Je vous comprends, j'ai le même réflexe. Là on est à <strong>8 % en phase 2</strong>, contre 15-25 % sur les généralistes. Et en phase 1 actuelle, c'est <strong>zéro commission</strong>, juste un petit abonnement — précisément parce qu'on est construit par un menuisier."
  },
  {
    q: "Mes clients viennent du bouche-à-oreille, je n'ai pas besoin d'Internet.",
    a: "C'est le meilleur canal, je ne vais pas vous dire le contraire. The Wooder ne remplace pas le bouche-à-oreille, c'est <strong>un tiroir supplémentaire</strong> — et surtout, l'outil technique (DXF, débit, ferrures auto-calculées) marche même pour vos clients directs. Beaucoup l'utilisent juste pour ça."
  },
  {
    q: "Je n'ai pas le temps de m'occuper d'une nouvelle plateforme.",
    a: "C'est normal. On a conçu la prise en main pour tenir en <strong>30 minutes</strong>, et on s'occupe nous-mêmes du devis et des échanges avec le client jusqu'à la commande. Vous ne touchez à la plateforme qu'<strong>une fois la commande confirmée</strong>."
  },
  {
    q: "Je ne travaille pas avec des clients particuliers, c'est l'enfer.",
    a: "Je sais, j'ai eu mes années difficiles aussi. On a justement filtré ça : le client <strong>valide un cahier des charges</strong> avant que vous le voyiez, les modifications sont <strong>limitées contractuellement</strong>, et on gère les relances de paiement. Vous récupérez un client déjà calé."
  },
  {
    q: "Votre outil ne marchera pas avec ma machine / mon flux de travail.",
    a: "C'est une vraie question. On sort les fichiers en <strong>DXF standard</strong> avec couches séparées pour le perçage, la rainure et le profilage. Ça tourne chez les gars qui ont du Biesse, du SCM, du Felder et même du Maslow. Le mieux : <strong>je vous envoie un fichier test tout de suite</strong>, vous l'ouvrez dans votre CAM et vous me dites."
  },
  {
    q: "Envoyez-moi une plaquette, je regarderai.",
    a: "Bien sûr, je vous envoie ça. Je me permets juste <strong>10 minutes en visio</strong> la semaine prochaine pour vous montrer le tool en live — c'est beaucoup plus parlant qu'un PDF. Mardi 10h ou jeudi 14h, qu'est-ce qui vous va ?"
  },
  {
    q: "C'est trop cher.",
    a: "Je comprends, c'est la première question qu'on se pose. Concrètement, l'abonnement est à [X €] par mois en bêta, et <strong>la première commande apportée le rentabilise</strong>. Et vous pouvez sortir à tout moment."
  },
  {
    q: "Rappelez-moi dans 6 mois.",
    a: "D'accord, je le note. Juste pour que je comprenne bien : <strong>qu'est-ce qui se passe dans 6 mois qui rendrait le moment plus propice ?</strong> [écouter]. Ok, dans ce cas je vous envoie quand même l'accès gratuit à l'outil CNC, comme ça vous le gardez sous le coude. Pas d'engagement."
  },
  {
    q: "Silence / hésitation.",
    a: "<strong>Ne pas combler le silence.</strong> Laisse-lui 4-5 secondes pour réfléchir. Ensuite : « Qu'est-ce qui vous fait hésiter là, concrètement ? »"
  }
];

const PREP_CHECKLIST = [
  "Vérifier le nom du contact et son entreprise (site web ouvert)",
  "Regarder 2-3 projets récents (Insta / site) → noter 1 détail à mentionner",
  "Savoir quelle CNC il possède si l'info est publique",
  "Avoir the-wooder.com ouvert dans un onglet",
  "Sourire avant de décrocher. Ça s'entend."
];

// =====================================================
// State & persistence
// =====================================================
const STORAGE_KEY = 'wooder_demarchage_v2';
const LEGACY_KEY = 'wooder_demarchage_v1';
let state = {
  prospects: [],
  filter: 'all',
  currentId: null,
  pitchStep: 0,
  pitchDraft: null,
  config: {
    userFirstName: 'Pierre',
    userLastName: '',
    userCity: '',
  }
};

function uid() { return 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.prospects)) {
        state.prospects = parsed.prospects;
      }
      if (parsed && parsed.config) {
        state.config = { ...state.config, ...parsed.config };
      }
    } else {
      // Migration from v1
      const legacy = localStorage.getItem(LEGACY_KEY);
      if (legacy) {
        try {
          const parsedLegacy = JSON.parse(legacy);
          if (parsedLegacy && Array.isArray(parsedLegacy.prospects)) {
            state.prospects = parsedLegacy.prospects.map(migrateProspect);
            save();
          }
        } catch(e) {}
      }
    }
  } catch(e) { console.warn('Load failed:', e); }

  // Ensure schema
  state.prospects = state.prospects.map(migrateProspect);
}

function migrateProspect(p) {
  return {
    id: p.id || uid(),
    name: p.name || '',
    company: p.company || '',
    role: p.role || '',
    city: p.city || '',
    department: p.department || '',
    phone: p.phone || '',
    email: p.email || '',
    website: p.website || '',
    source: p.source || '',
    cnc: p.cnc || '',          // 'very' | 'probable' | 'shared' | 'possible' | 'unlikely' | ''
    cncNotes: p.cncNotes || '',
    specialty: p.specialty || '',
    detail: p.detail || '',     // détail perso pour l'accroche
    status: p.status || 'todo',
    notes: p.notes || '',
    createdAt: p.createdAt || Date.now(),
    lastContact: p.lastContact || null,
    pitches: Array.isArray(p.pitches) ? p.pitches : [],
  };
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      prospects: state.prospects,
      config: state.config
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

}

function showList() {

function showDetail(id) {

// =====================================================
// List rendering
// =====================================================
function getCurrentProspects() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let list = [...state.prospects];

  // Filter
  const f = state.filter;
  if (f === 'priority') {
    list = list.filter(p => ['very','probable','shared'].includes(p.cnc) && !['declined','accepted'].includes(p.status));
  } else if (f === 'relance') {
    list = list.filter(p => ['email_sent','relance_1','relance_2','no_answer'].includes(p.status));
  } else if (f === 'rdv') {
    list = list.filter(p => ['rdv','accepted'].includes(p.status));
  } else if (f !== 'all') {
    list = list.filter(p => p.status === f);
  }

  if (q) {
    list = list.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.company || '').toLowerCase().includes(q) ||
      (p.city || '').toLowerCase().includes(q) ||
      (p.department || '').toLowerCase().includes(q) ||
      (p.specialty || '').toLowerCase().includes(q) ||
      (p.email || '').toLowerCase().includes(q)
    );
  }

  // Sort: priority CNC first among todo, then by status order, then by name
  const statusOrder = { rdv:0, accepted:0, interested:1, callback:2, relance_1:3, relance_2:3, email_sent:4, no_answer:5, todo:6, called:7, declined:8 };
  const cncOrder = { very:0, probable:1, shared:2, possible:3, unlikely:4, '':5 };
  list.sort((a, b) => {
    const sa = statusOrder[a.status] ?? 9;
    const sb = statusOrder[b.status] ?? 9;
    if (sa !== sb) return sa - sb;
    const ca = cncOrder[a.cnc] ?? 5;
    const cb = cncOrder[b.cnc] ?? 5;
    if (ca !== cb) return ca - cb;
    return (a.company || a.name || '').localeCompare(b.company || b.name || '');
  });

  return list;
}

function statusLabel(s) {
  return {
    todo: 'À contacter',
    email_sent: 'Email envoyé',
    relance_1: 'Relance 1',
    relance_2: 'Relance 2',
    called: 'Appelé',
    no_answer: 'Pas de réponse',
    callback: 'À rappeler',
    interested: 'Intéressé',
    rdv: 'RDV pris',
    accepted: 'Accepté ✓',
    declined: 'Refusé'
  }[s] || s;
}

function cncLabel(c) {
  return {
    very: 'CNC très probable',
    probable: 'CNC probable',
    shared: 'CNC partagée',
    possible: 'CNC possible',
    unlikely: 'CNC peu probable'
  }[c] || '';
}

function cncShort(c) {
  return {
    very: 'CNC ★★★',
    probable: 'CNC ★★',
    shared: 'CNC fablab',
    possible: 'CNC ?',
    unlikely: 'CNC –'
  }[c] || '';
}

function renderList() {
  const container = document.getElementById('prospect-list');
  const list = getCurrentProspects();

  // Stats
  document.getElementById('stat-total').textContent = state.prospects.length;
  document.getElementById('stat-todo').textContent = state.prospects.filter(p => p.status === 'todo').length;
  document.getElementById('stat-interested').textContent = state.prospects.filter(p => ['interested','rdv','accepted'].includes(p.status)).length;
  document.getElementById('stat-rdv').textContent = state.prospects.filter(p => ['rdv','accepted'].includes(p.status)).length;

  if (list.length === 0) {
    const totalEmpty = state.prospects.length === 0;
    container.innerHTML = `
      <div class="empty">
        <div class="empty-title">${totalEmpty ? 'Aucun prospect' : 'Aucun résultat'}</div>
        <div style="font-size:14px;">${totalEmpty ? 'Commence par importer ton fichier Excel ou CSV.' : 'Essaie un autre filtre ou une autre recherche.'}</div>
        ${totalEmpty ? `<button class="btn btn-accent" style="margin-top:20px; max-width:220px; margin-left:auto; margin-right:auto;" onclick="openImport()">Importer un fichier</button>` : ''}
      </div>`;
    return;
  }

  container.innerHTML = list.map(p => `
    <div class="prospect-card" onclick="showDetail('${p.id}')">
      <div class="prospect-card-top">
        <div style="min-width:0; flex:1;">
          <div class="prospect-name">${escapeHtml(p.company || p.name || 'Sans nom')}</div>
          ${p.name && p.company ? `<div class="prospect-company">${escapeHtml(p.name)}${p.role ? ' · ' + escapeHtml(p.role) : ''}</div>` : ''}
        </div>
        <div class="status status-${p.status}">${statusLabel(p.status)}</div>
      </div>
      ${p.specialty ? `<div class="prospect-specialty">${escapeHtml(p.specialty)}</div>` : ''}
      <div class="prospect-meta">
        ${p.city ? `<span>📍 ${escapeHtml(p.city)}${p.department ? ' (' + escapeHtml(p.department) + ')' : ''}</span>` : ''}
        ${p.cnc ? `<span class="cnc-chip cnc-${p.cnc}">${cncShort(p.cnc)}</span>` : ''}
        ${p.pitches && p.pitches.length ? `<span>💬 ${p.pitches.length}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === f);
  });
  renderList();
}

function renderCollectedBlock(pitch) {

  if (pitch.discoveryAnswers && Object.keys(pitch.discoveryAnswers).length) {

      .filter(([_, v]) => v && v.trim())
      .map(([idx, v]) => `<div style="margin-bottom:6px;"><div style="font-size:12px; font-style:italic; color:var(--ink-3);">« ${escapeHtml(DISCOVERY_QUESTIONS[parseInt(idx)] || '')} »</div><div>${escapeHtml(v)}</div></div>`)
      .join('');
    if (qas) rows.push(`<div class="summary-item"><div class="summary-item-label">Découverte</div><div class="summary-item-value">${qas}</div></div>`);
  }
  if (pitch.objectionsHit && pitch.objectionsHit.length) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Objections rencontrées</div><div class="summary-item-value"><div class="chip-list">${pitch.objectionsHit.map(i => `<div class="chip">${escapeHtml((OBJECTIONS[i] || {q:''}).q.slice(0, 40))}…</div>`).join('')}</div></div></div>`);
  }
  if (pitch.cta) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Action convenue</div><div class="summary-item-value"><strong>${pitch.cta === 'zoom' ? 'RDV visio' : pitch.cta === 'tool' ? 'Accès outil gratuit' : pitch.cta === 'callback' ? 'Rappeler plus tard' : pitch.cta === 'declined' ? 'Non ferme' : escapeHtml(pitch.cta)}</strong></div></div>`);
  }
  if (pitch.rdv && pitch.rdv.date) {
    const fmt = new Date(pitch.rdv.date + 'T' + (pitch.rdv.time || '09:00')).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'});
    rows.push(`<div class="summary-item"><div class="summary-item-label">Rendez-vous</div><div class="summary-item-value">${fmt}</div></div>`);
  }
  if (pitch.callbackDate) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">À rappeler</div><div class="summary-item-value">${new Date(pitch.callbackDate).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})}</div></div>`);

  if (pitch.pitchNotes) {
    rows.push(`<div class="summary-item"><div class="summary-item-label">Notes</div><div class="summary-item-value">${escapeHtml(pitch.pitchNotes)}</div></div>`);
  }
  if (rows.length === 0) return '';

  return `
    <div class="section-title">Dernier appel — ${new Date(pitch.date).toLocaleDateString('fr-FR')}</div>
    <div class="summary-card">

    </div>

// =====================================================
// Pitch flow
// =====================================================
const PITCH_STEPS = [
  { id: 'prep', label: 'Prépa' },
  { id: 'opening', label: 'Ouverture' },
  { id: 'hook', label: 'Accroche' },
  { id: 'pitch', label: 'Pitch' },
  { id: 'discovery', label: 'Découverte' },
  { id: 'cta', label: 'CTA' },
  { id: 'closing', label: 'Clôture' }
];

function startPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  state.pitchStep = 0;
  state.pitchDraft = {
    date: Date.now(),
    situation: '',           // answered / voicemail / gatekeeper / no_answer
    prepChecked: [],         // indices of checked prep items
    discoveryAnswers: {},    // { idx: text }
    discoveryAsked: [],      // indices of asked questions
    objectionsHit: [],       // indices of objections encountered
    cta: '',                 // zoom / tool / callback / declined
    rdv: { date: '', time: '10:00' },
    callbackDate: '',
    outcome: '',             // final status to apply
    pitchNotes: ''
  };
  document.getElementById('pitch-prospect-name').textContent = p.company || p.name;
  renderPitch();
  showView('view-pitch');
}

function exitPitch() {
  if (!confirm('Abandonner cet appel ? Les notes saisies seront perdues.')) return;
  state.pitchDraft = null;
  state.pitchStep = 0;
  showDetail(state.currentId);
}

function pitchNext() {
  const draft = state.pitchDraft;
  const step = PITCH_STEPS[state.pitchStep].id;

  // Branch after opening: if gatekeeper/voicemail/no_answer, skip to closing/finish
  if (step === 'opening') {
    if (draft.situation === 'voicemail') {
      // Go to closing with voicemail outcome
      draft.outcome = 'called';
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'closing');
      renderPitch();
      return;
    }
    if (draft.situation === 'gatekeeper') {
      // Show barrage script, stay on opening
      toast('Utilise le script barrage — dès que tu obtiens la personne, reprends « Il a décroché »');
      return;
    }
    if (draft.situation === 'no_answer') {
      draft.outcome = 'no_answer';
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'closing');
      renderPitch();
      return;
    }
    if (!draft.situation) {
      toast('Indique ce qui s\'est passé au décroché');
      return;
    }
  }

  // From CTA step: validate CTA chosen
  if (step === 'cta') {
    if (!draft.cta) {
      toast('Choisis l\'issue de l\'appel');
      return;
    }
  }

  // From closing: finish
  if (step === 'closing') {
    finishPitch();
    return;
  }

  state.pitchStep++;
  if (state.pitchStep >= PITCH_STEPS.length) {
    finishPitch();
    return;
  }
  renderPitch();
}

function pitchPrev() {
  if (state.pitchStep > 0) {
    // Handle jump-back from closing if we skipped steps
    const currentStep = PITCH_STEPS[state.pitchStep].id;
    if (currentStep === 'closing' && ['voicemail','no_answer'].includes(state.pitchDraft.situation)) {
      state.pitchStep = PITCH_STEPS.findIndex(s => s.id === 'opening');
    } else {
      state.pitchStep--;
    }
    renderPitch();
  } else {
    exitPitch();
  }
}

function finishPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  const draft = state.pitchDraft;

  // Determine final status
  let finalStatus = p.status;
  if (draft.cta === 'zoom' || draft.cta === 'tool') {
    finalStatus = 'interested';
    if (draft.rdv.date) finalStatus = 'rdv';
  } else if (draft.cta === 'callback') {
    finalStatus = 'callback';
  } else if (draft.cta === 'declined') {
    finalStatus = 'declined';
  } else if (draft.situation === 'voicemail') {
    finalStatus = 'called';
  } else if (draft.situation === 'no_answer') {
    finalStatus = 'no_answer';
  } else if (draft.situation === 'answered') {
    finalStatus = 'called';
  }
  draft.outcome = finalStatus;

  p.pitches = p.pitches || [];
  p.pitches.push({ ...draft, date: Date.now() });
  p.status = finalStatus;
  p.lastContact = Date.now();

  save();
  state.pitchDraft = null;
  state.pitchStep = 0;
  showDetail(p.id);
  toast('Appel enregistré ✓');
}

function renderPitch() {
  const p = state.prospects.find(x => x.id === state.currentId);
  const step = PITCH_STEPS[state.pitchStep];
  const draft = state.pitchDraft;

  // Progress bar
  const progressEl = document.getElementById('pitch-progress');
  progressEl.innerHTML = PITCH_STEPS.map((s, i) => {
    let cls = '';
    if (i < state.pitchStep) cls = 'done';
    else if (i === state.pitchStep) cls = 'active';
    return `<div class="pitch-progress-step ${cls}"></div>`;
  }).join('');

  const labelsEl = document.getElementById('pitch-progress-labels');
  labelsEl.innerHTML = PITCH_STEPS.map((s, i) => `<span class="${i === state.pitchStep ? 'active' : ''}">${s.label}</span>`).join('');

  // Prev button visibility
  document.getElementById('pitch-prev').style.display = state.pitchStep === 0 ? 'none' : 'flex';

  // Next button label
  const nextBtn = document.getElementById('pitch-next');
  nextBtn.textContent = step.id === 'closing' ? 'Terminer & enregistrer' : 'Suivant';

  const body = document.getElementById('pitch-body');
  const firstName = getFirstName(p);
  const userFirstName = state.config.userFirstName || 'Pierre';
  const userLastName = state.config.userLastName || '[Nom]';
  const userCity = state.config.userCity || '[ville]';

  const renderers = {
    prep: () => `
      <div class="pitch-step-label">Étape 1 / 7 — Prépa 60 secondes</div>
      <div class="pitch-title">Avant <em>de décrocher</em></div>
      <div class="pitch-subtitle">La différence entre un appel qui marche et un qui s'écroule se joue dans cette minute.</div>

      ${p.detail ? `
        <div class="adaptive-banner">
          <span class="adaptive-banner-icon">📝</span>

      ` : `
        <div class="adaptive-banner" style="background:var(--warning-soft); border-color:transparent; color:var(--warning);">
          <span class="adaptive-banner-icon">⚠️</span>
          <div>Aucun détail personnalisé noté pour ce prospect. <a onclick="quickAddDetail()" style="text-decoration:underline; cursor:pointer; font-weight:600;">Ajouter maintenant</a></div>
        </div>
      `}

      <div class="checklist">
        ${PREP_CHECKLIST.map((item, i) => `
          <div class="checklist-item ${draft.prepChecked.includes(i) ? 'done' : ''}" onclick="togglePrep(${i})">
            <div class="checklist-check"></div>
            <div class="checklist-text">${item}</div>
          </div>
        `).join('')}
      </div>

      ${p.cncNotes ? `
        <div class="script-box coach">
          <div class="script-text"><strong>Contexte CNC noté sur ce prospect :</strong><br>${escapeHtml(p.cncNotes)}</div>
        </div>
      ` : ''}

      <div class="decor-line">✦</div>
      <div style="font-size:13px; color:var(--ink-3); line-height:1.5; text-align:center; font-style:italic;">
        Sourire avant de décrocher. Ça s'entend.
      </div>
    `,

    opening: () => `
      <div class="pitch-step-label">Étape 2 / 7 — Ouverture · 30 secondes</div>
      <div class="pitch-title">Premier <em>contact</em></div>
      <div class="pitch-subtitle">Objectif : franchir le barrage, valider l'interlocuteur, obtenir 2 minutes d'attention.</div>

      <div class="script-box">
        <div class="script-text">
          Bonjour, <strong>${escapeHtml(firstName)}</strong>${p.name && firstName !== p.name ? ' ' + escapeHtml(getLastName(p)) : ''} ? <strong>${escapeHtml(userFirstName)} ${escapeHtml(userLastName)}</strong> à l'appareil, je suis menuisier à <strong>${escapeHtml(userCity)}</strong> et je lance <strong>The Wooder</strong>, une plateforme pour artisans menuisiers. Vous avez deux minutes ou je vous rappelle ?
        </div>
      </div>

      <div class="script-box coach">
        <div class="script-text">Tu te présentes comme <strong>menuisier AVANT</strong> de parler de la plateforme. C'est ton atout principal. Tu proposes tout de suite de rappeler — ça désamorce la tension.</div>
      </div>

      <div class="question-label">Qu'est-ce qui s'est passé au décroché ?</div>
      <div class="situation-grid">
        <button class="situation-btn ${draft.situation === 'answered' ? 'selected' : ''}" onclick="setSituation('answered')">
          <span class="emoji">✓</span>
          <span>Il a décroché</span>
        </button>
        <button class="situation-btn ${draft.situation === 'gatekeeper' ? 'selected' : ''}" onclick="setSituation('gatekeeper')">
          <span class="emoji">🚧</span>
          <span>Barrage (secrétaire / apprenti)</span>
        </button>
        <button class="situation-btn ${draft.situation === 'voicemail' ? 'selected' : ''}" onclick="setSituation('voicemail')">
          <span class="emoji">📬</span>
          <span>Répondeur</span>
        </button>
        <button class="situation-btn ${draft.situation === 'no_answer' ? 'selected' : ''}" onclick="setSituation('no_answer')">
          <span class="emoji">∅</span>
          <span>Pas de réponse</span>
        </button>
      </div>

      ${draft.situation === 'gatekeeper' ? `
        <div class="script-box">
          <div class="script-text">
            Bonjour, est-ce que <strong>${escapeHtml(firstName)}</strong> est dans l'atelier ? C'est <strong>${escapeHtml(userFirstName)}</strong>, <strong>de confrère à confrère</strong>, c'est à propos de The Wooder — il attend peut-être mon appel.
          </div>
        </div>
        <div class="script-box coach">
          <div class="script-text">« De confrère à confrère » désarme. « Il attend peut-être mon appel » installe l'idée que ce n'est pas du démarchage.</div>
        </div>
      ` : ''}

      ${draft.situation === 'voicemail' ? `
        <div class="script-box">
          <div class="script-text">
            Bonjour <strong>${escapeHtml(firstName)}</strong>, <strong>${escapeHtml(userFirstName)} ${escapeHtml(userLastName)}</strong> à l'appareil, menuisier à <strong>${escapeHtml(userCity)}</strong> et fondateur de The Wooder. Je vous appelle parce que votre atelier correspond pile au profil qu'on cherche pour notre lancement. <strong>Rien de commercial</strong>, juste une idée à partager de confrère à confrère. Rappelez-moi au [numéro] ou bien je retente demain matin. Bonne journée !
          </div>
        </div>
        <div class="script-box coach">
          <div class="script-text">20 secondes, parle lentement, épelle ton numéro à la fin.</div>
        </div>
      ` : ''}
    `,

    hook: () => {
      const hasDetail = p.detail && p.detail.trim();
      return `
        <div class="pitch-step-label">Étape 3 / 7 — Accroche · 45 secondes</div>
        <div class="pitch-title">Déclencher la <em>curiosité</em></div>
        <div class="pitch-subtitle">Un élément concret tiré de son activité. Sincère et spécifique.</div>

        <div class="script-box">
          <div class="script-text">
            Je suis tombé sur votre atelier via <strong>${escapeHtml(p.source || '[Instagram / Google / un confrère]')}</strong>. J'ai été frappé par <strong>${hasDetail ? escapeHtml(p.detail) : '[détail précis — le buffet en noyer posté la semaine dernière / votre ligne de cuisines cintrées / votre approche sans vis apparentes]'}</strong>. C'est exactement le type de travail qu'on met en avant sur The Wooder.
          </div>
        </div>

        ${!hasDetail ? `
          <div class="question">
            <label class="question-label">Détail précis à mentionner <span class="question-hint">(improvise si pas noté avant)</span></label>
            <input type="text" class="input-field" placeholder="Ex : votre cuisine cintrée en noyer postée la semaine dernière" value="" oninput="updateDetailInline(this.value)">
          </div>
        ` : ''}

        <div class="script-box coach">
          <div class="script-text"><strong>1 compliment SINCÈRE et SPÉCIFIQUE.</strong> Pas de « votre travail est magnifique » générique.</div>
        </div>
      `;
    },

    pitch: () => {
      const cncLevel = p.cnc;
      const isCncOriented = ['very','probable','shared'].includes(cncLevel);
      const isLowCnc = ['possible','unlikely'].includes(cncLevel);

      let adaptation = '';
      if (isCncOriented) {
        adaptation = `<div class="adaptive-banner">
          <span class="adaptive-banner-icon">⚙️</span>
          <div>Profil <strong>${cncLabel(cncLevel)}</strong> — insiste sur la partie outil technique (DXF, ferrures auto, fiche de débit). C'est son levier.</div>
        </div>`;
      } else if (isLowCnc) {
        adaptation = `<div class="adaptive-banner">
          <span class="adaptive-banner-icon">👥</span>
          <div>Profil <strong>${cncLabel(cncLevel)}</strong> — le DXF sera moins percutant. Insiste plutôt sur le flux client qualifié qu'on apporte.</div>
        </div>`;
      }

      return `
        <div class="pitch-step-label">Étape 4 / 7 — Pitch court · 90 secondes max</div>
        <div class="pitch-title">Expliquer <em>The Wooder</em></div>
        <div class="pitch-subtitle">3 phrases, bénéfice direct, stop. Si tu pars dans la technique, tu perds.</div>

        ${adaptation}

        <div class="script-box">
          <div class="script-text">
            En deux mots : <strong>The Wooder, c'est une marketplace de mobilier sur-mesure</strong> qui met en relation des particuliers et des menuisiers comme vous. Le client configure son meuble en <strong>3D</strong> sur le site, on gère le devis, et vous recevez directement le <strong>fichier DXF</strong>, la <strong>feuille de débit</strong> et les <strong>ferrures calculées</strong> — Clamex, Cabineo, tout est prêt pour votre CNC.
          </div>
        </div>

        <div class="script-box">
          <div class="script-text">
            Concrètement, vous gagnez sur deux choses : <strong>un flux de clients qualifiés</strong> qu'on vous apporte, et <strong>la partie devis + fichiers techniques</strong> qu'on vous économise. Vous vous concentrez sur l'atelier.
          </div>
        </div>

        ${isCncOriented ? `
          <div class="script-box coach">
            <div class="script-text">💡 <strong>Point à appuyer</strong> : « vos fichiers DXF arrivent prêts à usiner, vous évitez la phase de remodélisation. »</div>
          </div>
        ` : isLowCnc ? `
          <div class="script-box coach">
            <div class="script-text">💡 <strong>Point à appuyer</strong> : « on filtre les clients, on fait le devis — vous ne recevez que les projets confirmés. »</div>
          </div>
        ` : ''}

        <div class="script-box coach">
          <div class="script-text">Ne pas dévier. <strong>Trois phrases, bénéfice, stop.</strong> Passe à la découverte.</div>
        </div>
      `;
    },

    discovery: () => `
      <div class="pitch-step-label">Étape 5 / 7 — Découverte · 2 à 3 minutes</div>
      <div class="pitch-title">Le faire <em>parler</em></div>
      <div class="pitch-subtitle">Tu écoutes 70 % du temps à partir de maintenant. Choisis 3 à 4 questions, pas plus.</div>

      <div class="script-box coach">
        <div class="script-text"><strong>Tape la question</strong> en vert quand tu l'as posée, <strong>note la réponse</strong> en dessous. Reformule après chaque réponse (« Si je comprends bien… »).</div>
      </div>

      ${DISCOVERY_QUESTIONS.map((q, i) => `
        <div class="discovery-card ${draft.discoveryAsked.includes(i) ? 'asked' : ''}">
          <div class="discovery-card-q">
            ${escapeHtml(q)}
            <button class="discovery-toggle" onclick="toggleDiscovery(${i})">${draft.discoveryAsked.includes(i) ? 'Posée ✓' : 'Poser'}</button>
          </div>
          <textarea class="discovery-answer" placeholder="Sa réponse…" oninput="updateDiscoveryAnswer(${i}, this.value)">${escapeHtml(draft.discoveryAnswers[i] || '')}</textarea>
        </div>
      `).join('')}
    `,

    cta: () => `
      <div class="pitch-step-label">Étape 6 / 7 — Prochaine étape · 60 secondes</div>
      <div class="pitch-title">Proposer <em>une action</em></div>
      <div class="pitch-subtitle">Choix fermé entre deux oui. Jamais « voulez-vous un RDV ? ».</div>

      <div class="script-box">
        <div class="script-text">
          Écoutez, je pense que ça peut vraiment matcher avec votre atelier. Je vous propose deux options : soit on se fait un <strong>Zoom de 20 minutes</strong> la semaine prochaine où je vous montre la plateforme et le tool CNC en live, soit je vous envoie <strong>dès aujourd'hui un accès gratuit</strong> à notre outil de débit/DXF pour que vous le testiez sur un de vos projets. <strong>Qu'est-ce qui vous convient le mieux ?</strong>
        </div>
      </div>

      <div class="question-label">Son choix :</div>

      <div class="cta-card ${draft.cta === 'zoom' ? 'selected' : ''}" onclick="setCta('zoom')">
        <div class="cta-card-title">📹 RDV visio</div>
        <div class="cta-card-desc">Démo de 20 min la semaine prochaine</div>
      </div>
      <div class="cta-card ${draft.cta === 'tool' ? 'selected' : ''}" onclick="setCta('tool')">
        <div class="cta-card-title">🔧 Accès outil gratuit</div>
        <div class="cta-card-desc">Il teste le tool DXF sur un projet à lui</div>
      </div>
      <div class="cta-card ${draft.cta === 'callback' ? 'selected' : ''}" onclick="setCta('callback')">
        <div class="cta-card-title">↻ Rappeler plus tard</div>
        <div class="cta-card-desc">Pas prêt aujourd'hui, on refixe une date</div>
      </div>
      <div class="cta-card ${draft.cta === 'declined' ? 'selected' : ''}" onclick="setCta('declined')">
        <div class="cta-card-title">✗ Non ferme</div>
        <div class="cta-card-desc">Je clôture poliment, je garde la porte ouverte</div>
      </div>

      ${draft.cta === 'zoom' ? `
        <div class="section-title" style="margin-top:20px;">Date du visio</div>
        <div class="question">
          <label class="question-label">Date</label>
          <input type="date" class="input-field" value="${draft.rdv.date}" onchange="state.pitchDraft.rdv.date = this.value">
        </div>
        <div class="question">
          <label class="question-label">Heure</label>
          <input type="time" class="input-field" value="${draft.rdv.time}" onchange="state.pitchDraft.rdv.time = this.value">
        </div>
      ` : ''}

      ${draft.cta === 'callback' ? `
        <div class="question" style="margin-top:14px;">
          <label class="question-label">Date de rappel</label>
          <input type="date" class="input-field" value="${draft.callbackDate}" onchange="state.pitchDraft.callbackDate = this.value">
        </div>
      ` : ''}
    `,

    closing: () => {
      const draft = state.pitchDraft;
      const wasVoicemail = draft.situation === 'voicemail';
      const wasNoAnswer = draft.situation === 'no_answer';
      const wasDeclined = draft.cta === 'declined';

      let scriptContent = '';

      if (wasVoicemail) {
        scriptContent = `
          <div class="script-box coach">
            <div class="script-text">Message laissé sur répondeur. Pense à <strong>relancer demain matin</strong> si pas de rappel.</div>
          </div>`;
      } else if (wasNoAnswer) {
        scriptContent = `
          <div class="script-box coach">
            <div class="script-text">Pas de réponse. Note l'heure — tente à nouveau sur un autre créneau (<strong>matin tôt</strong> ou <strong>fin d'après-midi</strong>).</div>
          </div>`;
      } else if (wasDeclined) {
        scriptContent = `
          <div class="script-box">
            <div class="script-text">
              Pas de souci, je comprends. Juste une dernière chose : <strong>si vous voyez un confrère à qui ça pourrait servir</strong>, vous lui passez mon numéro ? Et si un jour vous changez d'avis, vous avez mon mail. Bonne continuation à vous.
            </div>
          </div>
          <div class="script-box coach">
            <div class="script-text">Reste chaleureux. Un « non » aujourd'hui peut devenir un « oui » dans 3 mois — ou une recommandation.</div>
          </div>`;
      } else {
        // Standard closing (zoom or tool agreed, or callback scheduled)
        scriptContent = `
          <div class="script-box">
            <div class="script-text">
              Parfait. Je vous envoie <strong>${draft.cta === 'zoom' ? "l'invitation Zoom" : draft.cta === 'tool' ? "l'accès à l'outil" : 'tout ça'}</strong> dans les 10 minutes sur <strong>${escapeHtml(p.email || '[email]')}</strong>. Je vous recontacte ${draft.cta === 'callback' && draft.callbackDate ? 'le ' + new Date(draft.callbackDate).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) : '[jour]'} pour avoir vos retours. <strong>Merci pour votre temps</strong> — et bon courage pour le chantier en cours !
            </div>
          </div>
          <div class="script-box coach">
            <div class="script-text">Confirme l'email à voix haute, donne une date précise, termine sur un mot chaleureux lié à leur métier.</div>
          </div>`;
      }

      return `
        <div class="pitch-step-label">Étape 7 / 7 — Clôture · 30 secondes</div>
        <div class="pitch-title">${wasDeclined ? 'Laisser la <em>porte ouverte</em>' : wasVoicemail || wasNoAnswer ? 'Noter & <em>relancer</em>' : 'Clore en <em>beauté</em>'}</div>

        ${scriptContent}

        <div class="section-title">Notes sur l'appel</div>
        <textarea class="note-field" placeholder="Ce que tu veux te souvenir (ton de voix, infos business, next steps…)" oninput="state.pitchDraft.pitchNotes = this.value">${escapeHtml(draft.pitchNotes || '')}</textarea>

        <div class="decor-line">✦ fin ✦</div>

        <div class="summary-card">
          <h3>Récapitulatif</h3>
          <div class="summary-item">
            <div class="summary-item-label">Issue</div>
            <div class="summary-item-value"><strong>${escapeHtml(situationLabel(draft.situation) || '—')}</strong>${draft.cta ? ' → ' + (draft.cta === 'zoom' ? 'RDV visio' : draft.cta === 'tool' ? 'Outil envoyé' : draft.cta === 'callback' ? 'À rappeler' : 'Non ferme') : ''}</div>
          </div>
          ${draft.rdv && draft.rdv.date ? `<div class="summary-item"><div class="summary-item-label">RDV</div><div class="summary-item-value">${draft.rdv.date} à ${draft.rdv.time}</div></div>` : ''}
          ${draft.callbackDate ? `<div class="summary-item"><div class="summary-item-label">Rappel</div><div class="summary-item-value">${draft.callbackDate}</div></div>` : ''}
          ${Object.values(draft.discoveryAnswers).filter(v => v && v.trim()).length ? `<div class="summary-item"><div class="summary-item-label">Découverte</div><div class="summary-item-value">${Object.values(draft.discoveryAnswers).filter(v => v && v.trim()).length} réponse(s) notée(s)</div></div>` : ''}
          ${draft.objectionsHit.length ? `<div class="summary-item"><div class="summary-item-label">Objections</div><div class="summary-item-value">${draft.objectionsHit.length} rencontrée(s)</div></div>` : ''}
        </div>
      `;
    }
  };

  body.innerHTML = renderers[step.id]();
}

// Pitch helper actions
function togglePrep(i) {
  const arr = state.pitchDraft.prepChecked;
  const idx = arr.indexOf(i);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(i);
  renderPitch();
}
function setSituation(s) {
  state.pitchDraft.situation = s;
  renderPitch();
}
function toggleDiscovery(i) {
  const arr = state.pitchDraft.discoveryAsked;
  const idx = arr.indexOf(i);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(i);
  renderPitch();
}
function updateDiscoveryAnswer(i, v) {
  state.pitchDraft.discoveryAnswers[i] = v;
  // Mark as asked if has content
  if (v && !state.pitchDraft.discoveryAsked.includes(i)) {
    state.pitchDraft.discoveryAsked.push(i);
    // Don't re-render to avoid losing focus; toggle is visible via class already stored
  }
}
function setCta(c) {
  state.pitchDraft.cta = c;
  renderPitch();
}
function quickAddDetail() {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  const v = prompt('Détail précis à mentionner dans l\'accroche :', p.detail || '');
  if (v !== null) {
    p.detail = v.trim();
    save();
    renderPitch();
  }
}
function updateDetailInline(v) {
  const p = state.prospects.find(x => x.id === state.currentId);
  if (!p) return;
  p.detail = v;
  save();
}

// =====================================================
// Objections panel
// =====================================================
function openObjections() {
  const hit = state.pitchDraft ? state.pitchDraft.objectionsHit : [];
  openModal(`
    <div class="modal-title">Objections fréquentes</div>
    <div style="font-size:13px; color:var(--ink-3); margin-bottom:14px; line-height:1.5;">
      Réponds toujours avec calme. <strong style="color:var(--ink-2);">Valide</strong> (« je comprends »), puis propose une perspective.
    </div>
    ${OBJECTIONS.map((obj, i) => `
      <div class="obj-item">
        <div class="obj-q">${escapeHtml(obj.q)}</div>
        <div class="obj-a">${obj.a}</div>
        ${state.pitchDraft ? `
          <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
            <button class="btn btn-ghost btn-sm ${hit.includes(i) ? '' : ''}" onclick="toggleObjectionHit(${i}); openObjections();" style="${hit.includes(i) ? 'background:var(--accent); color:white; border-color:var(--accent);' : ''} font-size:11px; padding:6px 10px;">
              ${hit.includes(i) ? '✓ Rencontrée' : 'Je l\'ai rencontrée'}
            </button>
          </div>
        ` : ''}
      </div>
    `).join('')}
    <div class="modal-actions">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Fermer</button>
    </div>
  `);
}
function toggleObjectionHit(i) {
  if (!state.pitchDraft) return;
  const arr = state.pitchDraft.objectionsHit;
  const idx = arr.indexOf(i);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(i);
}

          <option value="unlikely">Peu probable</option>

      </div>

function saveNewProspect() {
  const p = migrateProspect({
    id: uid(),
    company: document.getElementById('np-company').value.trim(),
    name: document.getElementById('np-name').value.trim(),
    role: document.getElementById('np-role').value.trim(),
    city: document.getElementById('np-city').value.trim(),
    department: document.getElementById('np-department').value.trim(),
    phone: document.getElementById('np-phone').value.trim(),
    email: document.getElementById('np-email').value.trim(),
    website: document.getElementById('np-website').value.trim(),
    source: document.getElementById('np-source').value.trim(),
    cnc: document.getElementById('np-cnc').value,
    specialty: document.getElementById('np-specialty').value.trim(),
    status: 'todo',
    createdAt: Date.now()
  });
  if (!p.company && !p.name) return;
  state.prospects.unshift(p);
  save();
  closeModal();
  renderList();
  toast('Prospect ajouté');
}

function editProspect(id) {
  const p = state.prospects.find(x => x.id === id);
  if (!p) return;

// =====================================================
// Import XLSX / CSV
// =====================================================
function openImport() {
  openModal(`
    <div class="modal-title">Importer un fichier</div>
    <div style="font-size:13px; color:var(--ink-2); line-height:1.55; margin-bottom:14px;">
      Formats acceptés : <strong>.xlsx</strong>, <strong>.xls</strong>, <strong>.csv</strong>.
    </div>
    <div style="font-size:12px; color:var(--ink-3); line-height:1.55; margin-bottom:14px; background:var(--surface-2); padding:10px 12px; border-radius:8px; border:1px solid var(--line);">
      L'outil détecte automatiquement les colonnes habituelles :<br>
      <strong>Entreprise</strong>, <strong>Contact</strong>, <strong>Fonction</strong>, <strong>Ville</strong>, <strong>Département</strong>, <strong>Téléphone</strong>, <strong>Email</strong>, <strong>Site/Insta</strong>, <strong>CNC</strong>, <strong>Spécialité</strong>, <strong>Source</strong>, <strong>Statut</strong>.<br><br>
      Les lignes de titre, tableaux de bord et légendes sont ignorés automatiquement.
    </div>
    <input type="file" id="import-file" accept=".csv,.xlsx,.xls,text/csv" onchange="handleImport(event)" style="display:none">
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:14px;">
      <input type="checkbox" id="import-replace" style="width:16px; height:16px; accent-color:var(--accent);">
      <label for="import-replace" style="font-size:13px; color:var(--ink-2); cursor:pointer;">Remplacer la liste actuelle (sinon : ajouter)</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent btn-block" onclick="document.getElementById('import-file').click()">Choisir un fichier</button>
    </div>
  `);
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  // Détection robuste du type (extension + MIME + taille)
  const name = file.name || '';
  const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
  const mime = (file.type || '').toLowerCase();
  const isXlsx = ext === 'xlsx' || ext === 'xls' ||
                 mime.includes('sheet') || mime.includes('excel') ||
                 mime === 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' ||
                 mime === 'application/vnd.ms-excel';
  const isCsv = ext === 'csv' || ext === 'tsv' || ext === 'txt' ||
                mime.includes('csv') || mime === 'text/plain';

  const replaceEl = document.getElementById('import-replace');
  const replace = replaceEl ? replaceEl.checked : false;

  // Vérifier que SheetJS est chargé si on a un XLSX
  if (isXlsx && typeof XLSX === 'undefined') {
    showError(`SheetJS n'a pas pu charger (pas de connexion ?). Essaie de :\n\n1. Vérifier ta connexion internet\n2. Recharger la page\n3. Ou convertir ton .xlsx en .csv et le réessayer`);
    return;
  }

  if (!isXlsx && !isCsv) {
    showError(`Format non reconnu : "${ext || 'sans extension'}" (${mime || 'type inconnu'}).\n\nFormats acceptés : .xlsx, .xls, .csv`);
    return;
  }

  const reader = new FileReader();

  reader.onerror = () => {
    console.error('FileReader error:', reader.error);
    showError(`Impossible de lire le fichier :\n${reader.error ? reader.error.message : 'erreur inconnue'}`);
  };

  reader.onload = (ev) => {
    let rows;
    // Stage 1: parsing
    try {
      if (isXlsx) {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) {
          throw new Error('Le classeur ne contient aucune feuille');
        }
        let sheetName = wb.SheetNames.find(n => /prospect/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
      } else {
        rows = parseCSV(ev.target.result);
      }
    } catch (err) {
      console.error('Parse error:', err);
      showError(`Erreur au parsing du fichier :\n${err.message || err}\n\nLe fichier est peut-être corrompu ou dans un format inattendu.`);
      return;
    }

    if (!rows || rows.length === 0) {
      showError('Le fichier semble vide.');
      return;
    }

    // Stage 2: extraction
    let imported;
    try {
      imported = extractProspectsFromRows(rows);
    } catch (err) {
      console.error('Extraction error:', err);
      showError(`Erreur d'extraction des prospects :\n${err.message || err}\n\nLa 1ère ligne de ton fichier : ${JSON.stringify((rows[0] || []).slice(0, 5))}`);
      return;
    }

    if (imported.length === 0) {
      showError(`Aucun prospect détecté.\n\nVérifie que ton fichier contient des colonnes comme "Entreprise", "Téléphone", "Email".\n\nEn-têtes trouvés : ${JSON.stringify((rows[0] || []).slice(0, 8))}`);
      return;
    }

    // Stage 3: apply
    if (replace) {
      state.prospects = imported;
    } else {
      const existingKeys = new Set(state.prospects.map(p => dedupKey(p)));
      imported.forEach(p => {
        if (!existingKeys.has(dedupKey(p))) {
          state.prospects.push(p);
        }
      });
    }
    save();
    closeModal();
    renderList();
    toast(`${imported.length} prospect${imported.length > 1 ? 's' : ''} ${replace ? 'importé' + (imported.length > 1 ? 's' : '') : 'ajouté' + (imported.length > 1 ? 's' : '')}`);
  };

  // Démarrage de la lecture
  try {
    if (isXlsx) {
      reader.readAsArrayBuffer(file);
    } else {
      reader.readAsText(file, 'UTF-8');
    }
  } catch (err) {
    console.error('Read trigger error:', err);
    showError(`Impossible de démarrer la lecture :\n${err.message || err}`);
  }
}

function showError(msg) {
  openModal(`
    <div class="modal-title">Oups…</div>
    <div style="font-size:14px; color:var(--ink-2); line-height:1.6; white-space:pre-wrap; padding: 4px 0 8px;">${escapeHtml(msg)}</div>
    <div class="modal-actions">
      <button class="btn btn-accent btn-block" onclick="closeModal()">OK</button>
    </div>
  `);
}

function dedupKey(p) {
  return (p.company || '').trim().toLowerCase() + '|' + (p.phone || '').replace(/\s/g, '');
}

function extractProspectsFromRows(rows) {
  if (!rows || rows.length === 0) return [];

  // Find header row: the row that contains at least 2 of the expected column names
  const columnHints = ['entreprise','contact','nom','telephone','téléphone','email','ville','cnc','statut','site','insta','specialite','spécialité','source','fonction','departement','département'];
  let headerRowIdx = -1;
  let bestScore = 0;
  for (let i = 0; i < Math.min(rows.length, 20); i++) {
    const cells = rows[i].map(c => normalizeHeader(c));
    let score = 0;
    columnHints.forEach(h => { if (cells.some(c => c.includes(h))) score++; });
    if (score > bestScore && score >= 3) {
      bestScore = score;
      headerRowIdx = i;
    }
  }
  if (headerRowIdx < 0) {
    // Fallback: assume first row is header
    headerRowIdx = 0;
  }

  const header = rows[headerRowIdx].map(normalizeHeader);

  // Build column index map
  const findCol = (keywords) => {
    for (const k of keywords) {
      const idx = header.findIndex(h => h.includes(k));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const cols = {
    company: findCol(['entreprise','societe','atelier','raison sociale']),
    name: findCol(['contact','nom prenom','nom du contact','nom','interlocuteur']),
    role: findCol(['fonction','poste','role']),
    city: findCol(['ville','city','localite']),
    department: findCol(['departement','dept','code postal']),
    phone: findCol(['telephone','tel','phone','portable','mobile']),
    email: findCol(['email','e-mail','courriel','mail']),
    website: findCol(['site','insta','instagram','url','web']),
    cnc: findCol(['cnc']),
    specialty: findCol(['specialite','style','activite']),
    source: findCol(['source','origine','canal','trouve']),
    status: findCol(['statut','status','etat','etape'])
  };

  if (cols.company < 0 && cols.name < 0) {
    // Can't identify — fail gracefully
    return [];
  }

  const prospects = [];
  const CNC_LEVEL_WORDS = /^(tres probable|probable|partagee|possible|peu probable)$/;

  for (let i = headerRowIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;

    const joined = row.join(' ').trim();
    if (!joined) continue;

    // ⚠️ Stop completely when we hit a dashboard/legend section — everything after is meta
    if (/📊|légende statut|legende statut|tableau de bord/i.test(joined)) {
      break;
    }

    // Skip methodology or other noise lines
    if (/methodologie|méthodologie/i.test(joined)) continue;

    // Skip dashboard sum rows (À contacter, Email envoyé in column B with empty A…)
    const lowJoined = joined.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (/^(total|a contacter|email envoye|relance \d|appel|rdv pris|accepte|refuse|pas de reponse|taux de conversion)/.test(lowJoined)) continue;

    const company = cols.company >= 0 ? cleanCell(row[cols.company]) : '';
    const name = cols.name >= 0 ? cleanCell(row[cols.name]) : '';

    if (!company && !name) continue;

    // Skip rows where company is just a number
    if (company && /^\d+$/.test(company.trim())) continue;

    // Skip rows where company is ONLY a CNC level word (Partagée, Possible, etc. = legend row)
    const companyNorm = company.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    if (CNC_LEVEL_WORDS.test(companyNorm)) continue;

    const cncRaw = cols.cnc >= 0 ? cleanCell(row[cols.cnc]) : '';
    const cncValue = parseCncLevel(cncRaw);
    const cncNotes = cncRaw && cncRaw.length > 20 ? cncRaw.replace(/^(très probable|probable|partagée|possible|peu probable)\s*[—–\-:]\s*/i, '').trim() : '';

    const statusRaw = cols.status >= 0 ? cleanCell(row[cols.status]) : '';
    const statusValue = parseStatus(statusRaw);

    prospects.push(migrateProspect({
      id: uid(),
      company: company,
      name: name === '—' ? '' : name,
      role: cols.role >= 0 ? cleanCell(row[cols.role]) : '',
      city: cols.city >= 0 ? cleanCell(row[cols.city]) : '',
      department: cols.department >= 0 ? cleanCell(row[cols.department]) : '',
      phone: cols.phone >= 0 ? cleanPhone(row[cols.phone]) : '',
      email: cols.email >= 0 ? cleanEmail(row[cols.email]) : '',
      website: cols.website >= 0 ? cleanCell(row[cols.website]) : '',
      source: cols.source >= 0 ? cleanCell(row[cols.source]) : '',
      cnc: cncValue,
      cncNotes: cncNotes,
      specialty: cols.specialty >= 0 ? cleanCell(row[cols.specialty]) : '',
      status: statusValue || 'todo',
      createdAt: Date.now()
    }));
  }

  return prospects;
}

function cleanCell(v) {
  if (v == null) return '';
  const s = String(v).trim();
  if (s === '—' || s === '-' || s === 'à trouver' || s === 'N/A' || s === 'n/a') return '';
  return s;
}
function cleanPhone(v) {
  const s = cleanCell(v);
  return s; // keep as-is
}
function cleanEmail(v) {
  const s = cleanCell(v);
  if (!s || !s.includes('@')) return '';
  return s;
}

function parseCncLevel(str) {
  if (!str) return '';
  const s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // Ordre important : tester les qualificatifs "tres probable" et "peu probable" AVANT "probable" seul
  if (s.includes('tres probable')) return 'very';
  if (s.includes('peu probable')) return 'unlikely';
  if (s.includes('partagee') || s.includes('fablab')) return 'shared';
  if (s.startsWith('probable') || s.includes(' probable')) return 'probable';
  if (s.includes('possible')) return 'possible';
  return '';
}

function parseStatus(str) {
  if (!str) return '';
  const s = str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  if (s.includes('a contacter') || s === 'todo') return 'todo';
  if (s.includes('email envoye')) return 'email_sent';
  if (s.includes('relance 1')) return 'relance_1';
  if (s.includes('relance 2')) return 'relance_2';
  if (s.includes('rdv')) return 'rdv';
  if (s.includes('accepte')) return 'accepted';
  if (s.includes('refuse')) return 'declined';
  if (s.includes('pas de reponse')) return 'no_answer';
  if (s.includes('interesse')) return 'interested';
  if (s.includes('rappeler') || s.includes('callback')) return 'callback';
  if (s.includes('appele')) return 'called';
  return '';
}

function parseCSV(text) {
  const firstLine = text.split(/\r?\n/)[0] || '';
  const sep = firstLine.includes(';') && firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === sep) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* ignore */ }
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c && String(c).trim()));
}

function normalizeHeader(h) {
  return (h || '').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// =====================================================
// Export CSV
// =====================================================
function exportCSV() {
  const headers = [
    'Entreprise','Contact','Fonction','Ville','Département','Téléphone','Email','Site/Insta',
    'CNC','Contexte CNC','Spécialité','Source','Statut','Détail accroche',
    'Dernier appel - date','Dernier appel - issue','Dernier appel - CTA',
    'RDV date','RDV heure','Rappel date',
    'Découverte: direct/prescripteur','Découverte: CNC','Découverte: casse-tête','Découverte: volume','Découverte: autres plateformes',
    'Notes pitch','Notes libres'
  ];
  const rows = [headers];

  state.prospects.forEach(p => {
    const lp = p.pitches && p.pitches.length ? p.pitches[p.pitches.length - 1] : {};
    const da = lp.discoveryAnswers || {};
    rows.push([
      p.company, p.name, p.role, p.city, p.department, p.phone, p.email, p.website,
      cncLabel(p.cnc), p.cncNotes, p.specialty, p.source, statusLabel(p.status), p.detail,
      lp.date ? new Date(lp.date).toLocaleDateString('fr-FR') : '',
      lp.situation ? situationLabel(lp.situation) : '',
      lp.cta === 'zoom' ? 'RDV visio' : lp.cta === 'tool' ? 'Outil envoyé' : lp.cta === 'callback' ? 'À rappeler' : lp.cta === 'declined' ? 'Non ferme' : '',
      lp.rdv && lp.rdv.date || '',
      lp.rdv && lp.rdv.time || '',
      lp.callbackDate || '',
      da[0] || '', da[1] || '', da[2] || '', da[3] || '', da[4] || '',
      lp.pitchNotes || '', p.notes || ''
    ]);
  });

  const csv = rows.map(r => r.map(cell => {
    const s = (cell == null ? '' : String(cell));
    if (/[",;\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }).join(';')).join('\r\n');

  const BOM = '\ufeff';
  const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `wooder-demarchage-${dateStr}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export téléchargé');
}

function exportJSON() {

}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data && Array.isArray(data.prospects)) {
          if (confirm(`Restaurer ${data.prospects.length} prospect(s) ? Cela remplacera les données actuelles.`)) {
            state.prospects = data.prospects.map(migrateProspect);
            if (data.config) state.config = { ...state.config, ...data.config };
            save();
            renderList();
            closeModal();
            toast('Sauvegarde restaurée');
          }
        } else toast('Fichier JSON invalide');
      } catch(e) { toast('Erreur de lecture JSON'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function wipeAll() {
  if (!confirm('⚠️ Supprimer TOUS les prospects et tout l\'historique ? Action irréversible.')) return;
  if (!confirm('Vraiment sûr ? Pense à exporter avant.')) return;
  state.prospects = [];
  save();
  closeModal();

}
