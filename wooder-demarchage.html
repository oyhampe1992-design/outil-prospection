      <button class="btn btn-ghost btn-block" onclick="closeModal(); openImport()">
        📥 Importer un fichier
      </button>
      <button class="btn btn-ghost btn-block" onclick="closeModal(); exportCSV()">
        📊 Exporter en CSV
      </button>
      <button class="btn btn-ghost btn-block" onclick="exportJSON()">
        💾 Sauvegarder (JSON)
      </button>
      <button class="btn btn-ghost btn-block" onclick="importJSON()">
        ♻️ Restaurer une sauvegarde
      </button>
      <button class="btn btn-danger btn-block" onclick="wipeAll()">
        🗑️ Tout effacer
      </button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Fermer</button>
    </div>
    <div style="margin-top:16px; padding-top:14px; border-top:1px solid var(--line); font-size:11px; color:var(--ink-3); text-align:center; font-family:var(--font-display); font-style:italic;">
      The Wooder — ${state.prospects.length} prospect${state.prospects.length > 1 ? 's' : ''} en base
    </div>
  `);
}

// =====================================================
// Modal & Toast helpers
// =====================================================
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeUrl(url) {
  if (!url) return '#';
  return url.startsWith('http') ? url : 'https://' + url;
}
function getFirstName(p) {
  if (!p.name) return '[Prénom]';
  return p.name.split(/\s+/)[0];
}
function getLastName(p) {
  if (!p.name) return '';
  const parts = p.name.split(/\s+/);
  return parts.slice(1).join(' ');
}

// =====================================================
// Init
// =====================================================
load();
renderList();

// Onboarding: if first launch, prompt for name
if (state.prospects.length === 0 && !state.config.userLastName && !state.config.userCity) {
  setTimeout(() => {
    openModal(`
      <div class="modal-title">Bienvenue 👋</div>
      <div style="font-size:14px; color:var(--ink-2); line-height:1.55; margin-bottom:16px;">
        Avant de démarrer, renseigne ton prénom, ton nom et ta ville. Ces infos seront injectées automatiquement dans les scripts d'appel.
      </div>
      <div class="form-group"><label>Ton prénom</label><input class="input-field" id="cfg-firstName" value="${escapeAttr(state.config.userFirstName)}" placeholder="Pierre"></div>
      <div class="form-group"><label>Ton nom</label><input class="input-field" id="cfg-lastName" value="${escapeAttr(state.config.userLastName)}" placeholder="Dupont"></div>
      <div class="form-group"><label>Ta ville</label><input class="input-field" id="cfg-city" value="${escapeAttr(state.config.userCity)}" placeholder="Paris"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-accent btn-block" onclick="completeOnboarding()">C'est parti</button>
      </div>
    `);
  }, 300);
}

// Dedicated onboarding handler — robust against any failure in the chain
function completeOnboarding() {
  try {
    const fn = document.getElementById('cfg-firstName');
    const ln = document.getElementById('cfg-lastName');
    const ct = document.getElementById('cfg-city');
    state.config.userFirstName = fn ? fn.value.trim() : '';
    state.config.userLastName = ln ? ln.value.trim() : '';
    state.config.userCity = ct ? ct.value.trim() : '';
    save();
  } catch(e) {
    console.error('Onboarding save failed:', e);
  }
  closeModal();
  // Open import modal after a brief delay so the user sees the transition
  setTimeout(() => {
    try { openImport(); } catch(e) { console.error('Open import failed:', e); }
  }, 250);
}
</script>
